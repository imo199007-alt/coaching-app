<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>振り返りノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS — Dark Mode
═══════════════════════════════════════ */
:root {
  --bg:         #0F1923;
  --bg-2:       #141E2B;
  --surface:    #1A2634;
  --surface-2:  #1F2E40;
  --surface-3:  #243346;
  --border:     rgba(255,255,255,.08);
  --border-2:   rgba(255,255,255,.14);
  --text-1:     #F0F4F8;
  --text-2:     #A8B8C8;
  --text-3:     #607080;
  --blue:       #3B82F6;
  --blue-2:     #2563EB;
  --blue-3:     #60A5FA;
  --blue-bg:    rgba(59,130,246,.12);
  --blue-glow:  rgba(59,130,246,.25);
  --green:      #10B981;
  --green-bg:   rgba(16,185,129,.12);
  --amber:      #F59E0B;
  --amber-bg:   rgba(245,158,11,.12);
  --danger:     #EF4444;
  --danger-bg:  rgba(239,68,68,.12);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --font-sans: 'Noto Sans JP',-apple-system,sans-serif;
  --font-num:  'Inter',var(--font-sans);
  --dur: 160ms;
  --ease: cubic-bezier(.25,.1,.25,1);
}

/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-sans);
  background:var(--bg);
  color:var(--text-1);
  line-height:1.65;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:640px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar{
  height:56px;
  background:rgba(15,25,35,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  position:sticky;top:0;z-index:100;
}
.topbar-brand{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-num);
  font-size:16px;font-weight:700;
  color:var(--text-1);letter-spacing:-.01em;
}
.topbar-brand .dot{
  width:8px;height:8px;
  background:var(--blue);
  border-radius:50%;
  box-shadow:0 0 8px var(--blue-glow);
}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-user{font-size:13px;color:var(--text-2);font-family:var(--font-num)}
.topbar-out{
  font-size:12px;color:var(--text-3);
  background:none;border:1px solid var(--border);
  border-radius:6px;padding:5px 12px;cursor:pointer;
  font-family:var(--font-sans);
  transition:color var(--dur),border-color var(--dur);
}
.topbar-out:hover{color:var(--text-2);border-color:var(--border-2)}

/* ═══════════════════════════════════════
   AUTH
═══════════════════════════════════════ */
.auth-page{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 24px;
  background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.08) 0%,transparent 70%);
}
.auth-card{
  width:100%;max-width:400px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:40px 36px;
  box-shadow:0 24px 64px rgba(0,0,0,.4);
  animation:cardIn .25s cubic-bezier(0,0,.3,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.auth-card{padding:32px 24px}}
.auth-logo{
  width:48px;height:48px;
  background:var(--blue-bg);
  border:1px solid rgba(59,130,246,.2);
  border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
}
.auth-logo svg{color:var(--blue)}
.auth-title{
  text-align:center;
  font-family:var(--font-num);
  font-size:22px;font-weight:700;
  color:var(--text-1);margin-bottom:4px;
}
.auth-sub{
  text-align:center;font-size:13px;
  color:var(--text-3);margin-bottom:32px;
  font-family:var(--font-num);
}
.auth-divider{border:none;border-top:1px solid var(--border);margin:24px 0}
.auth-footer{text-align:center;font-size:13px;color:var(--text-3);line-height:1.8}
.auth-link{
  color:var(--blue-3);background:none;border:none;
  font-size:13px;font-family:var(--font-sans);cursor:pointer;
  transition:opacity var(--dur);
}
.auth-link:hover{opacity:.75}
.admin-badge{
  display:inline-block;font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--blue-3);border:1px solid rgba(59,130,246,.3);
  padding:3px 10px;border-radius:4px;margin-bottom:14px;
}

/* ═══════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════ */
.field{margin-bottom:18px}
.field-label{
  display:block;font-size:11px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:7px;
  font-family:var(--font-num);
}
.field-input{
  width:100%;height:46px;padding:0 14px;
  background:var(--bg-2);
  border:1px solid var(--border-2);
  border-radius:var(--r-sm);
  font-size:15px;color:var(--text-1);
  transition:border-color var(--dur),box-shadow var(--dur);
  -webkit-appearance:none;
}
.field-input::placeholder{color:var(--text-3)}
.field-input:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 3px var(--blue-glow);
}
.field-textarea{
  width:100%;min-height:120px;
  padding:12px 14px;
  background:var(--bg-2);
  border:1px solid var(--border-2);
  border-radius:var(--r-sm);
  font-size:15px;font-family:var(--font-sans);
  color:var(--text-1);resize:vertical;line-height:1.7;
  transition:border-color var(--dur),box-shadow var(--dur);
  -webkit-appearance:none;
}
.field-textarea::placeholder{color:var(--text-3)}
.field-textarea:focus{
  outline:none;border-color:var(--blue);
  box-shadow:0 0 0 3px var(--blue-glow);
}
/* textarea inside q-block */
.q-block textarea{
  width:100%;min-height:120px;padding:12px 14px;
  background:var(--bg-2);border:1px solid var(--border-2);
  border-radius:var(--r-sm);font-size:15px;
  font-family:var(--font-sans);color:var(--text-1);
  resize:vertical;line-height:1.7;
  transition:border-color var(--dur),box-shadow var(--dur);
  -webkit-appearance:none;
}
.q-block textarea::placeholder{color:var(--text-3)}
.q-block textarea:focus{
  outline:none;border-color:var(--blue);
  box-shadow:0 0 0 3px var(--blue-glow);
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-height:46px;padding:0 22px;border:none;border-radius:var(--r-sm);
  font-size:14px;font-weight:700;font-family:var(--font-sans);
  letter-spacing:.01em;white-space:nowrap;cursor:pointer;
  transition:background var(--dur),opacity var(--dur),transform var(--dur),box-shadow var(--dur);
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
}
.btn:active:not(:disabled){transform:scale(.96)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{
  background:var(--blue);color:#fff;
  box-shadow:0 4px 16px rgba(59,130,246,.3);
}
.btn-primary:hover:not(:disabled){
  background:var(--blue-2);
  box-shadow:0 6px 20px rgba(59,130,246,.4);
}
.btn-ghost{
  background:var(--surface-2);color:var(--text-2);
  border:1px solid var(--border-2);
}
.btn-ghost:hover:not(:disabled){background:var(--surface-3);color:var(--text-1)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover:not(:disabled){background:#DC2626}
.btn-sm{min-height:34px;padding:0 14px;font-size:13px}
.btn-full{width:100%}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn.loading{pointer-events:none}
.btn.loading .btn-text{opacity:0}
.btn.loading::after{
  content:'';position:absolute;
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;
}
.btn-ghost.loading::after{
  border-color:rgba(255,255,255,.1);
  border-top-color:var(--text-2);
}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  margin-bottom:28px;
}
.tab{
  flex:1;height:48px;border:none;background:none;
  font-size:14px;font-weight:500;font-family:var(--font-sans);
  color:var(--text-3);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color var(--dur),border-color var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.tab:hover{color:var(--text-2)}
.tab.active{
  color:var(--blue-3);
  border-bottom-color:var(--blue);
  font-weight:700;
}

/* ═══════════════════════════════════════
   SEGMENT
═══════════════════════════════════════ */
.seg{
  display:flex;background:var(--bg-2);
  border:1px solid var(--border);
  border-radius:var(--r-md);padding:3px;gap:3px;
  margin-bottom:24px;
}
.seg-btn{
  flex:1;height:36px;border:none;background:none;
  border-radius:9px;font-size:13px;font-weight:500;
  font-family:var(--font-sans);color:var(--text-3);
  cursor:pointer;transition:all var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.seg-btn.active{
  background:var(--surface-3);color:var(--blue-3);
  font-weight:700;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}

/* ═══════════════════════════════════════
   THEME CARDS
═══════════════════════════════════════ */
.theme-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  margin-bottom:10px;
  cursor:pointer;
  transition:all var(--dur);
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}
.theme-card:hover{
  border-color:rgba(59,130,246,.3);
  background:var(--surface-2);
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.theme-card:active{transform:translateY(0);box-shadow:none}
.theme-card-inner{
  display:flex;align-items:center;
  padding:18px 20px;gap:14px;
}
.theme-card-icon{
  width:40px;height:40px;flex-shrink:0;
  background:var(--blue-bg);
  border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  color:var(--blue-3);
}
.theme-card-body{flex:1;min-width:0}
.theme-card-title{font-size:15px;font-weight:700;color:var(--text-1)}
.theme-card-sub{font-size:13px;color:var(--text-3);margin-top:2px}
.theme-card-arrow{
  color:var(--text-3);font-size:20px;flex-shrink:0;
  transition:transform var(--dur),color var(--dur);
}
.theme-card:hover .theme-card-arrow{
  transform:translateX(3px);color:var(--blue-3);
}

/* ═══════════════════════════════════════
   PAGE LAYOUT
═══════════════════════════════════════ */
.pb{padding:28px 20px 80px}
@media(max-width:480px){.pb{padding:20px 16px 80px}.topbar{padding:0 16px}}
.page-eyebrow{
  font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--blue-3);margin-bottom:4px;
  font-family:var(--font-num);
}
.page-title{
  font-size:22px;font-weight:700;
  color:var(--text-1);
  font-family:var(--font-num);
  letter-spacing:-.01em;line-height:1.3;
  margin-bottom:20px;
}
.sec-label{
  font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:12px;
  font-family:var(--font-num);
}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;color:var(--text-3);
  background:none;border:none;cursor:pointer;
  padding:8px 0;margin-bottom:16px;
  font-family:var(--font-sans);
  transition:color var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.back-btn::before{content:'←';transition:transform var(--dur)}
.back-btn:hover{color:var(--blue-3)}
.back-btn:hover::before{transform:translateX(-3px)}

/* ═══════════════════════════════════════
   STEP INDICATOR
═══════════════════════════════════════ */
.steps{
  display:flex;align-items:center;
  margin-bottom:28px;gap:0;
}
.step-item{display:flex;align-items:center;gap:8px;flex:1}
.step-num{
  width:28px;height:28px;border-radius:50%;
  border:2px solid var(--border-2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--text-3);
  font-family:var(--font-num);flex-shrink:0;
  transition:all .2s;
}
.step-num.active{border-color:var(--blue);background:var(--blue);color:#fff;box-shadow:0 0 12px var(--blue-glow)}
.step-num.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.step-label{font-size:12px;color:var(--text-3);font-weight:500}
.step-label.active{color:var(--blue-3);font-weight:700}
.step-line{flex:1;height:1px;background:var(--border);margin:0 8px}

/* ═══════════════════════════════════════
   ROUND SELECT
═══════════════════════════════════════ */
.round-select-list{display:flex;flex-direction:column;gap:8px}
.round-opt{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:var(--r-md);
  padding:14px 18px;cursor:pointer;
  transition:all var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.round-opt input[type=radio]{display:none}
.round-opt:hover{border-color:rgba(59,130,246,.4);background:var(--surface-2)}
.round-opt:has(input:checked){
  border-color:var(--blue);
  background:var(--blue-bg);
  box-shadow:0 0 0 1px var(--blue);
}
.round-opt-content{display:flex;align-items:center;gap:12px}
.round-opt-icon{font-size:20px}
.round-opt-label{font-size:15px;font-weight:500;color:var(--text-2)}
.round-opt:has(input:checked) .round-opt-label{color:var(--blue-3);font-weight:700}
.round-opt-arrow{color:var(--text-3);font-size:18px;transition:all var(--dur)}
.round-opt:has(input:checked) .round-opt-arrow{color:var(--blue-3);transform:translateX(2px)}

/* ═══════════════════════════════════════
   QUESTION BLOCKS
═══════════════════════════════════════ */
.q-block{
  padding:24px 0;
  border-bottom:1px solid var(--border);
  animation:fadeUp .18s cubic-bezier(0,0,.3,1) both;
}
.q-block:first-child{padding-top:4px}
.q-block:last-child{border-bottom:none}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.q-label{
  font-size:15px;font-weight:700;color:var(--text-1);
  margin-bottom:12px;line-height:1.6;white-space:pre-wrap;
}

/* ═══════════════════════════════════════
   OPTION CARDS
═══════════════════════════════════════ */
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.opt-card{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  min-height:46px;padding:10px 12px;
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:var(--r-sm);
  cursor:pointer;text-align:center;
  transition:all var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.opt-card input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.opt-card span{font-size:13px;font-weight:500;color:var(--text-2);line-height:1.4;transition:color var(--dur)}
.opt-card:hover{border-color:rgba(59,130,246,.4);background:var(--surface-2)}
.opt-card:has(input:checked){
  border-color:var(--blue);background:var(--blue-bg);
  box-shadow:0 0 0 1px var(--blue);
}
.opt-card:has(input:checked) span{color:var(--blue-3);font-weight:700}
.opt-list .opt-card{justify-content:flex-start;padding:12px 16px;text-align:left}
.opt-list .opt-card span{font-size:14px}

/* ═══════════════════════════════════════
   QA VIEW
═══════════════════════════════════════ */
.qa-block{padding:18px 0;border-bottom:1px solid var(--border)}
.qa-block:last-child{border-bottom:none;padding-bottom:0}
.qa-q{
  font-size:11px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:7px;
  white-space:pre-wrap;font-family:var(--font-num);
}
.qa-a{font-size:15px;color:var(--text-1);white-space:pre-wrap;line-height:1.7}

/* ═══════════════════════════════════════
   ACCORDION
═══════════════════════════════════════ */
.acc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  overflow:hidden;margin-bottom:8px;
}
.acc-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;gap:12px;
  transition:background var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.acc-head:hover{background:var(--surface-2)}
.acc-chevron{
  font-style:normal;font-size:13px;color:var(--text-3);
  transition:transform .2s;flex-shrink:0;
}
.acc-head.open .acc-chevron{transform:rotate(180deg)}
.acc-body{
  display:none;padding:0 18px 18px;
  border-top:1px solid var(--border);
}
.acc-body.open{display:block;animation:fadeUp .18s cubic-bezier(0,0,.3,1) both}

/* ═══════════════════════════════════════
   BADGES
═══════════════════════════════════════ */
.rbadge{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:4px;
  font-size:12px;font-weight:700;
  font-family:var(--font-num);letter-spacing:.03em;
}
.rb-1{background:var(--blue-bg);color:var(--blue-3)}
.rb-2{background:var(--green-bg);color:var(--green)}
.rb-3{background:var(--amber-bg);color:var(--amber)}
.tp{font-size:11px;padding:2px 8px;border-radius:3px;font-weight:700;display:inline-block;letter-spacing:.04em}
.tp-text{background:var(--surface-3);color:var(--text-3)}
.tp-select{background:rgba(139,92,246,.15);color:#A78BFA}

/* ═══════════════════════════════════════
   ALERTS
═══════════════════════════════════════ */
.alert{
  padding:12px 16px;border-radius:var(--r-sm);
  font-size:14px;margin-bottom:16px;
  border-left:3px solid;
  animation:fadeUp .18s cubic-bezier(0,0,.3,1) both;
}
.alert-error{background:var(--danger-bg);color:#FCA5A5;border-color:var(--danger)}
.alert-success{background:var(--green-bg);color:#6EE7B7;border-color:var(--green)}
.alert-info{background:var(--blue-bg);color:var(--blue-3);border-color:var(--blue)}

/* ═══════════════════════════════════════
   SUCCESS VIEW
═══════════════════════════════════════ */
.success-view{
  text-align:center;padding:48px 24px;
  animation:fadeUp .3s cubic-bezier(0,0,.3,1) both;
}
.success-icon{width:72px;height:72px;margin:0 auto 24px}
.success-icon svg{width:72px;height:72px}
.check-circle{fill:none;stroke:var(--blue);stroke-width:2;stroke-dasharray:201;stroke-dashoffset:201;animation:checkCircle .5s cubic-bezier(0,0,.3,1) .1s forwards}
.check-mark{fill:none;stroke:var(--blue);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:40;stroke-dashoffset:40;animation:checkMark .3s cubic-bezier(0,0,.3,1) .5s forwards}
@keyframes checkCircle{to{stroke-dashoffset:0}}
@keyframes checkMark{to{stroke-dashoffset:0}}
.success-title{font-size:22px;font-weight:700;color:var(--text-1);margin-bottom:8px;font-family:var(--font-num)}
.success-sub{font-size:14px;color:var(--text-2);margin-bottom:32px;line-height:1.7}

/* ═══════════════════════════════════════
   ADMIN
═══════════════════════════════════════ */
.admin-nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:28px}
.admin-nav-btn{
  height:44px;border:1px solid var(--border);
  border-radius:var(--r-sm);background:var(--surface);
  font-size:13px;font-weight:500;font-family:var(--font-sans);
  color:var(--text-3);cursor:pointer;
  transition:all var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.admin-nav-btn:hover{border-color:var(--border-2);color:var(--text-2);background:var(--surface-2)}
.admin-nav-btn.active{border-color:var(--blue);color:var(--blue-3);background:var(--blue-bg);font-weight:700}

/* List group */
.list-group{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;
}
.list-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);gap:12px;
  transition:background var(--dur);
}
.list-item:last-child{border-bottom:none}
.list-item.clickable{cursor:pointer;-webkit-tap-highlight-color:transparent}
.list-item.clickable:hover{background:var(--surface-2)}
.list-item.clickable:active{background:var(--surface-3)}
.li-title{font-size:14px;font-weight:500;color:var(--text-1)}
.li-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.li-arrow{color:var(--text-3);font-size:18px;flex-shrink:0;transition:all var(--dur)}
.list-item.clickable:hover .li-arrow{transform:translateX(2px);color:var(--blue-3)}

/* Q row */
.q-row{padding:16px 0;border-bottom:1px solid var(--border)}
.q-row:last-child{border-bottom:none}
.q-row-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-num{font-size:12px;color:var(--text-3);font-weight:700;font-family:var(--font-num);min-width:18px}
.q-text{font-size:14px;color:var(--text-1);white-space:pre-wrap;margin-bottom:8px;line-height:1.65}
.q-opts{font-size:12px;color:var(--text-3);margin-bottom:10px}

/* Modal */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px);
  z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:bgFade .2s var(--ease) both;
}
@keyframes bgFade{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:var(--r-xl);
  width:100%;max-width:460px;
  max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:modalIn .2s cubic-bezier(0,0,.3,1) both;
}
@keyframes modalIn{from{opacity:0;transform:scale(.94)translateY(10px)}to{opacity:1;transform:scale(1)translateY(0)}}
.modal-head{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.modal-title{font-size:17px;font-weight:700;color:var(--text-1);font-family:var(--font-num)}
.modal-close{
  width:32px;height:32px;background:none;border:none;
  border-radius:50%;font-size:20px;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background var(--dur),color var(--dur);
}
.modal-close:hover{background:var(--surface-3);color:var(--text-1)}
.modal-body{padding:20px 24px 28px}
@media(max-width:480px){.modal-head,.modal-body{padding-left:20px;padding-right:20px}}

/* Skeleton */
.skeleton{
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface-2) 50%,var(--surface) 75%);
  background-size:200% 100%;
  border-radius:6px;
  animation:shimmer 1.4s infinite;
}
@keyframes shimmer{to{background-position:-200% 0}}
.skel-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.skel-item{padding:18px 20px;border-bottom:1px solid var(--border)}
.skel-item:last-child{border-bottom:none}
.skel-line{height:14px;border-radius:4px}
.skel-line-sm{height:11px;border-radius:3px;margin-top:8px}

/* Empty / Loading */
.empty{text-align:center;padding:48px 16px;color:var(--text-3)}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.4}
.empty p{font-size:14px}
.loading{text-align:center;padding:40px;color:var(--text-3);font-size:13px}
.spin{
  width:20px;height:20px;
  border:2px solid var(--border-2);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite;
  display:inline-block;margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

.div{border:none;border-top:1px solid var(--border);margin:20px 0}

@media(max-width:480px){
  .btn-group{flex-direction:column}
  .btn-group .btn{width:100%}
  .list-item .btn-group,.q-row .btn-group{flex-direction:row}
  .list-item .btn-group .btn,.q-row .btn-group .btn{width:auto}
}
</style>
</head>

<script>

// ========== 設定 ==========
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwa9hD7G_OphQXQtA5fbBZ_imhAL87FIdmWMjfxtooLv91TfVYn6EA1m03AHDo1kWjJ/exec';
var ROUND_LABELS = {1:'初回',2:'1か月後',3:'3か月後'};
var OPTION_TEMPLATES = {
  level5:'1=未着手\n2=意識あり\n3=実施中\n4=定着\n5=他者に指導できる',
  agree4:'1=そう思わない\n2=あまりそう思わない\n3=ややそう思う\n4=そう思う',
  freq4:'1=ほとんどしない\n2=たまにする\n3=よくする\n4=いつもする'
};

// ========== 状態管理（localStorage でセッション保持） ==========
var state = {
  token: localStorage.getItem('nrt_token') || null,
  role:  localStorage.getItem('nrt_role')  || null,
  username: localStorage.getItem('nrt_username') || null,
  userId: localStorage.getItem('nrt_userId') || null,
  currentTheme: null,
  currentRound: null,
  adminCurrentTheme: null,
  adminCurrentRound: 1
};

function saveSession(token, role, username, userId) {
  state.token = token; state.role = role;
  state.username = username; state.userId = userId;
  localStorage.setItem('nrt_token', token);
  localStorage.setItem('nrt_role', role);
  localStorage.setItem('nrt_username', username || '');
  localStorage.setItem('nrt_userId', userId || '');
}
function clearSession() {
  state.token = null; state.role = null;
  state.username = null; state.userId = null;
  ['nrt_token','nrt_role','nrt_username','nrt_userId'].forEach(function(k){ localStorage.removeItem(k); });
}

// ========== API ==========
function api(data) {
  data.token = state.token || null;
  return fetch(GAS_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(data)
  })
  .then(function(r){ return r.json(); })
  .catch(function(e){ return {ok:false, error:'通信エラー: '+e.message}; });
}

// ========== ページ制御 ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showUserLogin() {
  document.getElementById('auth-user-block').style.display = 'flex';
  document.getElementById('auth-admin-block').style.display = 'none';
}
function showAdminLogin() {
  document.getElementById('auth-user-block').style.display = 'none';
  document.getElementById('auth-admin-block').style.display = 'flex';
}
function switchHomeTab(tab) {
  var tabs = document.querySelectorAll('#page-home .tabs .tab');
  tabs[0].classList.toggle('active', tab==='answer');
  tabs[1].classList.toggle('active', tab==='history');
  document.getElementById('home-answer').style.display  = tab==='answer'  ? 'block' : 'none';
  document.getElementById('home-history').style.display = tab==='history' ? 'block' : 'none';

function openAnswerTheme(themeId, themeName) {
  state.currentTheme = themeId; state.currentRound = null;
  document.getElementById('answer-theme-name').textContent = themeName;
  document.getElementById('answer-eyebrow').textContent = '振り返り記録';
  document.getElementById('answer-questions').innerHTML = '';
  document.getElementById('answer-error').innerHTML = '';
  document.getElementById('answer-actions').style.display = 'none';
  // Reset step indicator
  var s1n=document.getElementById('step-num-1'); var s1l=document.getElementById('step-label-1');
  var s2n=document.getElementById('step-num-2'); var s2l=document.getElementById('step-label-2');
  var stepsEl=document.getElementById('answer-steps');
  if(s1n){s1n.className='step-num active';s1l.className='step-label active';}
  if(s2n){s2n.className='step-num';s2l.className='step-label';}
  if(stepsEl) stepsEl.style.display='flex';
  // 回数選択
  var roundIcons = {1:'🎯',2:'📅',3:'🏆'};
  var html = '<div style="margin-bottom:24px"><div class="sec-label">振り返りの回数を選択</div><div class="round-select-list">';
  [1,2,3].forEach(function(r){
    html += '<label class="round-opt">' +
      '<input type="radio" name="round" value="'+r+'" onchange="selectRound('+r+')">' +
      '<div class="round-opt-content">' +
      '<span class="round-opt-icon">'+roundIcons[r]+'</span>' +
      '<span class="round-opt-label">'+ROUND_LABELS[r]+'</span>' +
      '</div>' +
      '<span class="round-opt-arrow">›</span>' +
      '</label>';
  });
  html += '</div></div>';
  document.getElementById('answer-round-select').innerHTML = html;
  showPage('page-answer');
}

function selectRound(round) {
  state.currentRound = round;
  // Step indicator: move to step 2
  var s1n=document.getElementById('step-num-1'); var s1l=document.getElementById('step-label-1');
  var s2n=document.getElementById('step-num-2'); var s2l=document.getElementById('step-label-2');
  if(s1n){s1n.className='step-num done';s1l.className='step-label';}
  if(s2n){s2n.className='step-num active';s2l.className='step-label active';}
  var qEl  = document.getElementById('answer-questions');
  var actEl = document.getElementById('answer-actions');
  var errEl = document.getElementById('answer-error');
  qEl.innerHTML = '<div class="loading"><span class="spin"></span>設問を読み込み中...</div>';
  errEl.innerHTML = ''; actEl.style.display = 'none';

  api({action:'getQuestions', themeId:state.currentTheme, round:round}).then(function(r){
    if (!r.ok) { qEl.innerHTML='<div class="alert alert-error">'+esc(r.error)+'</div>'; return; }
    if (!r.questions||!r.questions.length) { qEl.innerHTML='<div class="alert alert-info">この回数の設問はまだ設定されていません。</div>'; return; }
    // 既回答チェック
    api({action:'getMyAnswers', themeId:state.currentTheme, round:round}).then(function(ar){
      var answered = ar.ok && ar.answers && ar.answers.length > 0 && ar.answers.some(function(a){ return a.answerText && a.answerText !== ''; });
      if (answered) {
        qEl.innerHTML = '<div class="alert alert-success">✅ この振り返りは回答済みです。</div>' + renderQAView(ar.answers);
        actEl.style.display = 'none';
      } else {
        qEl.innerHTML = renderAnswerForm(r.questions);
        actEl.style.display = 'block';
      }
    });
  });
}

function renderAnswerForm(questions) {
  return questions.map(function(q){
    var html = '<div class="q-block" data-qid="'+q.questionId+'"><div class="q-label">'+escBr(q.questionText)+'</div>';
    if (q.questionType==='select' && q.options) {
      var opts = String(q.options).split('\n').filter(function(o){ return o.trim(); });
      var isShort = opts.every(function(o){ return o.trim().length <= 10; });
      html += '<div class="'+(isShort?'opt-grid':'opt-list')+'">' +
        opts.map(function(o){
          return '<label class="opt-card"><input type="radio" name="q_'+q.questionId+'" value="'+esc(o.trim())+'"><span>'+esc(o.trim())+'</span></label>';
        }).join('') + '</div>';
    } else {
      html += '<textarea class="field-textarea" placeholder="回答を入力してください" style="width:100%;min-height:100px"></textarea>';
    }
    return html + '</div>';
  }).join('');
}

function renderQAView(answers) {
  if (!answers||!answers.length) return '<div class="empty"><p>回答データがありません</p></div>';
  return answers.map(function(q){
    return '<div class="qa-block"><div class="qa-q">'+escBr(q.questionText)+'</div>' +
      '<div class="qa-a">'+(q.answerText ? esc(q.answerText) : '<span style="color:var(--ink4)">未回答</span>')+'</div></div>';
  }).join('');
}

function submitAnswers() {
  if (!state.currentRound){ showErr('answer-error','回数を選択してください'); return; }
  var fields = document.querySelectorAll('#answer-questions [data-qid]');
  var answers=[]; var invalid=false;
  fields.forEach(function(f){
    var qid=f.dataset.qid;
    var ta=f.querySelector('textarea'); var rd=f.querySelector('input[type=radio]:checked');
    var val=ta?ta.value.trim():(rd?rd.value:'');
    if(!val) invalid=true;
    answers.push({questionId:qid, answerText:val});
  });
  if(invalid){ showErr('answer-error','全ての設問に回答してください'); return; }
  showErr('answer-error','');
  var submitBtn = document.getElementById('submit-btn');
  if(submitBtn){ submitBtn.classList.add('loading'); submitBtn.disabled=true; }
  api({action:'submitAnswers', themeId:state.currentTheme, round:state.currentRound, answers:answers}).then(function(r){
    if(submitBtn){ submitBtn.classList.remove('loading'); submitBtn.disabled=false; }
    if(!r.ok){ showErr('answer-error', r.error); return; }
    document.getElementById('answer-questions').innerHTML='';
    document.getElementById('answer-round-select').innerHTML='';
    document.getElementById('answer-steps').style.display='none';
    document.getElementById('answer-actions').style.display='none';
    document.getElementById('answer-error').innerHTML='';
    var qEl=document.getElementById('answer-questions');
    qEl.innerHTML='<div class="success-view">' +
      '<div class="success-icon"><svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<circle class="check-circle" cx="26" cy="26" r="25"/>' +
      '<path class="check-mark" d="M14 27l8 8 16-16"/></svg></div>' +
      '<div class="success-title">回答を保存しました</div>' +
      '<div class="success-sub">振り返りを記録できました。<br>続けて履歴を確認できます。</div>' +
      '<div style="display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto">' +
      '<button class="btn btn-primary btn-full" onclick="showPage(\'page-home\')"><span class="btn-text">ホームへ戻る</span></button>' +
      '<button class="btn btn-ghost btn-full" onclick="switchHomeTabAndGo()"><span class="btn-text">履歴を確認する</span></button>' +
      '</div></div>';
  });
}

function openHistoryTheme(themeId, themeName) {

function goBackToHistory(){ showPage('page-home'); switchHomeTab('history'); }

function toggleAcc(head) {
  var body = head.nextElementSibling;
  var isOpen = body.classList.contains('open');
  head.classList.toggle('open', !isOpen);
  if (!isOpen) {
    body.classList.add('open');
    if (body.innerHTML === '') {
      body.innerHTML = '<div class="loading"><span class="spin"></span>読み込み中...</div>';
      var themeId = body.dataset.theme;
      var round = body.dataset.round;
      api({action:'getMyAnswers', themeId:themeId, round:round}).then(function(r){
        body.innerHTML = r.ok && r.answers && r.answers.length ? renderQAView(r.answers) : '<div style="padding:8px;color:var(--ink4);font-size:13px">回答データがありません</div>';
      });
    }
  } else {
    body.classList.remove('open');
  }
}

  document.getElementById('modal-q-options').value='';

  api({action:'adminSaveQuestion',questionId:qid||null,themeId:state.adminCurrentTheme,round:state.adminCurrentRound,orderNum:parseInt(order)||1,questionText:text,questionType:qtype,options:opts}).then(function(r){

      return api({action:'adminSaveQuestion',questionId:null,themeId:state.adminCurrentTheme,round:state.adminCurrentRound,orderNum:q.orderNum,questionText:q.questionText,questionType:q.questionType,options:q.options||''});

  document.getElementById('admin-detail-username').textContent=username+' さんの回答';
  var el=document.getElementById('admin-detail-content');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
  adminTab('answer-detail');
  api({action:'adminGetUserAnswers',userId:userId}).then(function(r){
    if(!r.ok||!r.answerGroups||!r.answerGroups.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📝</div><p>回答がありません</p></div>'; return; }
    var byTheme={};
    r.answerGroups.forEach(function(g){ if(!byTheme[g.themeId]) byTheme[g.themeId]={themeName:g.themeName,rounds:[]}; byTheme[g.themeId].rounds.push(g); });
    el.innerHTML=Object.values(byTheme).map(function(theme){
      return '<div style="margin-bottom:20px"><div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px">'+esc(theme.themeName)+'</div>'+
        theme.rounds.map(function(g){
          return '<div class="acc" style="margin-bottom:8px">' +
            '<div class="acc-head open" onclick="toggleAccStatic(this)">' +
            '<div style="display:flex;align-items:center;gap:8px"><span class="rbadge rb-'+g.round+'">'+ROUND_LABELS[g.round]+'</span>' +
            '<span style="font-size:12px;color:var(--ink4)">'+(g.answeredAt?String(g.answeredAt).slice(0,10):'')+'</span></div>' +
            '<em class="acc-chevron" style="transform:rotate(180deg)">▼</em></div>' +
            '<div class="acc-body open">'+
            g.items.map(function(item){
              return '<div class="qa-block"><div class="qa-q">'+escBr(item.questionText)+'</div>' +
                '<div class="qa-a">'+esc(item.answerText||'（未回答）')+'</div></div>';
            }).join('')+'</div></div>';
        }).join('')+'</div>';
    }).join('');
  });
}
function toggleAccStatic(head){
  var body=head.nextElementSibling;
  var isOpen=body.classList.contains('open');
  head.classList.toggle('open',!isOpen);
  body.classList.toggle('open',!isOpen);
  var ch=head.querySelector('.acc-chevron');
  if(ch) ch.style.transform=!isOpen?'rotate(180deg)':'rotate(0deg)';
}

// ========== ユーティリティ ==========
function closeModal(id){ document.getElementById(id).style.display='none'; }
function showErr(elId,msg){ var el=document.getElementById(elId); if(el) el.innerHTML=msg?'<div class="alert alert-error">'+esc(msg)+'</div>':''; }
function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escBr(str){ return esc(str).replace(/\n/g,'<br>'); }

document.getElementById('login-password').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ ['modal-theme','modal-question','modal-create-user'].forEach(function(id){ var m=document.getElementById(id); if(m&&m.style.display!=='none') closeModal(id); }); } });
document.getElementById('admin-password').addEventListener('keydown',function(e){ if(e.key==='Enter') doAdminLogin(); });


</script>
