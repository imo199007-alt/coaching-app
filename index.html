<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>振り返りノート</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2D6A4F;
  --primary-dark:#1B4332;
  --primary-light:#52B788;
  --accent:#40916C;
  --accent-light:#D8F3DC;
  --secondary:#457B9D;
  --secondary-light:#A8DADC;
  --danger:#C0392B;
  --danger-light:#FEF2F0;
  --success:#1B5E35;
  --success-light:#EDF7F1;
  --warning:#F39C12;
  --warning-light:#FEF5E7;
  
  --text-primary:#1C1C1A;
  --text-secondary:#3D3D39;
  --text-tertiary:#7A7A72;
  --text-light:#AEAEA4;
  
  --bg-primary:#FAFAF8;
  --bg-secondary:#F3F3F0;
  --bg-tertiary:#ECEAE6;
  --surface:#FFFFFF;
  --surface-alt:#F8F8F6;
  
  --border-light:#E8E8E2;
  --border-medium:#D8D8D0;
  
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.12);
  --shadow-xl:0 12px 40px rgba(0,0,0,0.15);
  
  --serif:'Lora',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
}

html{font-size:16px}
body{
  font-family:var(--sans);
  background:var(--bg-primary);
  color:var(--text-primary);
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

#app{max-width:600px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* ── TOPBAR ── */
.topbar{
  border-bottom:1px solid var(--border-light);
  padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);
  position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow-sm);
}
.topbar-brand{
  font-family:var(--serif);
  font-size:18px;font-weight:700;
  color:var(--primary);letter-spacing:-.01em;
}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-user{font-size:12px;color:var(--text-tertiary);font-weight:500}
.topbar-btn{
  font-size:12px;font-family:var(--sans);font-weight:600;
  color:var(--text-tertiary);background:none;border:none;cursor:pointer;
  padding:6px 0;transition:all .2s ease;
}
.topbar-btn:hover{color:var(--primary);transform:translateY(-1px)}

/* ── PAGE BODY ── */
.pb{padding:32px 24px 80px}

/* ── LOGIN ── */
.login-outer{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:24px;background:linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
}
.login-box{width:100%;max-width:420px}
.login-eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--primary);margin-bottom:12px;
}
.login-title{
  font-family:var(--serif);font-size:32px;font-weight:700;
  color:var(--text-primary);margin-bottom:8px;letter-spacing:-.02em;
}
.login-sub{font-size:15px;color:var(--text-tertiary);margin-bottom:36px;line-height:1.6}
.login-form{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md)}
.login-divider{
  border:none;border-top:1px solid var(--border-light);margin:24px 0;
}

/* ── ADMIN LOGIN ── */
.admin-login-box{width:100%;max-width:420px}
.admin-badge{
  display:inline-block;font-size:10px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--primary);background:var(--accent-light);
  padding:6px 12px;border-radius:var(--radius-sm);margin-bottom:12px;
}
.admin-title{
  font-family:var(--serif);font-size:28px;font-weight:700;
  color:var(--text-primary);margin-bottom:6px;letter-spacing:-.02em;
}
.admin-sub{font-size:14px;color:var(--text-tertiary);margin-bottom:28px}

/* ── FIELD ── */
.fld{margin-bottom:18px}
.fld > label{
  display:block;font-size:12px;font-weight:700;
  color:var(--text-secondary);letter-spacing:.04em;text-transform:uppercase;
  margin-bottom:8px;
}
.fld input,.fld textarea{
  width:100%;
  padding:12px 14px;
  border:1.5px solid var(--border-medium);
  border-radius:var(--radius-md);
  font-size:15px;font-family:var(--sans);
  color:var(--text-primary);background:var(--bg-primary);
  transition:all .2s ease;
  -webkit-appearance:none;
}
.fld input:focus,.fld textarea:focus{
  outline:none;
  border-color:var(--primary);
  background:var(--surface);
  box-shadow:0 0 0 4px rgba(45,106,79,.1);
}
.fld textarea{resize:vertical;min-height:100px}
.fld .note{font-size:12px;color:var(--text-light);margin-top:6px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 22px;border-radius:var(--radius-md);border:none;
  font-size:14px;font-weight:600;font-family:var(--sans);
  cursor:pointer;transition:all .2s ease;
  letter-spacing:.01em;-webkit-tap-highlight-color:transparent;
}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);color:#fff;box-shadow:var(--shadow-md)}
.btn-primary:hover:not(:disabled){box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.btn-secondary{background:var(--bg-secondary);color:var(--text-secondary);border:1.5px solid var(--border-medium)}
.btn-secondary:hover:not(:disabled){background:var(--bg-tertiary);border-color:var(--text-tertiary)}
.btn-ghost{
  background:transparent;color:var(--text-tertiary);
  border:1.5px solid var(--border-light);
}
.btn-ghost:hover:not(:disabled){border-color:var(--text-secondary);color:var(--text-secondary);background:var(--bg-secondary)}
.btn-danger{background:var(--danger);color:#fff;box-shadow:var(--shadow-md)}
.btn-danger:hover:not(:disabled){box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.btn-link{
  background:none;border:none;
  font-size:13px;font-weight:600;font-family:var(--sans);
  color:var(--primary);cursor:pointer;padding:0;
  text-decoration:none;transition:color .2s ease;
}
.btn-link:hover{color:var(--primary-dark)}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-full{width:100%;padding:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* ── HEADINGS ── */
.page-title{
  font-family:var(--serif);font-size:26px;font-weight:700;
  color:var(--text-primary);letter-spacing:-.02em;margin-bottom:8px;
}
.page-sub{font-size:14px;color:var(--text-tertiary);margin-bottom:28px;line-height:1.6}
.section-label{
  font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-light);
  margin-bottom:14px;
}

/* ── BACK LINK ── */
.back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;color:var(--text-tertiary);
  background:none;border:none;cursor:pointer;padding:0;
  margin-bottom:24px;transition:all .2s ease;
  -webkit-tap-highlight-color:transparent;
}
.back:hover{color:var(--primary);transform:translateX(-3px)}
.back::before{content:'←';margin-right:2px;font-size:16px}

/* ── TABS ── */
.tab-bar{
  display:flex;gap:0;
  border-bottom:2px solid var(--border-light);
  margin-bottom:28px;
}
.tab-item{
  padding:12px 18px;border:none;background:none;
  font-size:14px;font-weight:600;font-family:var(--sans);
  color:var(--text-light);cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:all .2s ease;-webkit-tap-highlight-color:transparent;
}
.tab-item.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-item:hover:not(.active){color:var(--text-secondary)}

/* ── SEGMENT ── */
.seg{
  display:inline-flex;background:var(--bg-secondary);
  border:1px solid var(--border-medium);border-radius:var(--radius-md);padding:3px;
  margin-bottom:24px;width:100%;
}
.seg-btn{
  flex:1;padding:10px 6px;border:none;background:none;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;font-family:var(--sans);
  color:var(--text-tertiary);cursor:pointer;transition:all .15s ease;text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.seg-btn.active{background:var(--surface);color:var(--primary);box-shadow:var(--shadow-sm)}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius-lg);padding:20px;
  box-shadow:var(--shadow-sm);transition:all .3s ease;
  cursor:pointer;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow-md);
  border-color:var(--primary-light);
}
.card-title{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:6px}
.card-desc{font-size:13px;color:var(--text-tertiary);margin-bottom:12px;line-height:1.5}
.card-meta{font-size:12px;color:var(--text-light);display:flex;gap:12px;align-items:center}

/* ── THEME CARD ── */
.theme-card{
  background:linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
  border:1px solid var(--border-light);
  border-radius:var(--radius-lg);
  padding:22px;
  box-shadow:var(--shadow-sm);
  transition:all .3s cubic-bezier(.4,.0,.2,1);
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
.theme-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  opacity:0;
  transition:opacity .3s ease;
  z-index:-1;
}
.theme-card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-lg);
  border-color:var(--primary);
}
.theme-card:hover::before{opacity:.05}
.theme-name{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:8px}
.theme-desc{font-size:13px;color:var(--text-tertiary);margin-bottom:12px;line-height:1.5}
.theme-arrow{color:var(--primary);font-size:18px;font-weight:700;transition:transform .3s ease}
.theme-card:hover .theme-arrow{transform:translateX(4px)}

/* ── LIST ROWS ── */
.row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;border-bottom:1px solid var(--border-light);gap:12px;
}
.row:last-child{border-bottom:none}
.row-clickable{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s ease}
.row-clickable:hover .row-title{color:var(--primary)}
.row-title{font-size:15px;font-weight:600;color:var(--text-primary);transition:color .2s ease}
.row-sub{font-size:13px;color:var(--text-tertiary);margin-top:3px}
.row-arrow{color:var(--text-light);font-size:18px;flex-shrink:0;transition:transform .2s ease}
.row-clickable:hover .row-arrow{transform:translateX(3px);color:var(--primary)}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;
  padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;
  letter-spacing:.02em;
}
.badge-primary{background:var(--accent-light);color:var(--primary-dark)}
.badge-secondary{background:var(--secondary-light);color:var(--secondary)}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-warning{background:var(--warning-light);color:var(--warning)}
.badge-danger{background:var(--danger-light);color:var(--danger)}

/* ── QA BLOCKS ── */
.qa-block{padding:18px 0;border-bottom:1px solid var(--border-light)}
.qa-block:last-child{border-bottom:none}
.qa-q{
  font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--primary);margin-bottom:8px;white-space:pre-wrap;
}
.qa-a{
  font-size:15px;color:var(--text-secondary);white-space:pre-wrap;line-height:1.7;
}

/* ── ACCORDION ── */
.accordion{
  border:1px solid var(--border-light);border-radius:var(--radius-md);
  overflow:hidden;margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}
.acc-head{
  padding:14px 18px;background:var(--bg-secondary);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;gap:12px;-webkit-tap-highlight-color:transparent;
  transition:all .2s ease;
}
.acc-head:hover{background:var(--bg-tertiary)}
.acc-chevron{color:var(--text-tertiary);font-size:14px;transition:transform .3s ease;flex-shrink:0;font-weight:700}
.acc-head.open .acc-chevron{transform:rotate(180deg)}
.acc-body{padding:18px;border-top:1px solid var(--border-light);display:none}
.acc-body.open{display:block}

/* ── OPTIONS ── */
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.opt-card{
  position:relative;display:flex;align-items:center;justify-content:center;
  padding:13px 10px;border:1.5px solid var(--border-medium);border-radius:var(--radius-md);
  background:var(--surface);cursor:pointer;
  transition:all .2s ease;
  text-align:center;min-height:48px;
  -webkit-tap-highlight-color:transparent;
}
.opt-card input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.opt-card span{font-size:13px;font-weight:600;color:var(--text-tertiary);line-height:1.4;transition:color .2s ease}
.opt-card:has(input:checked){
  border-color:var(--primary);
  background:var(--accent-light);
  box-shadow:0 0 0 3px rgba(45,106,79,.1);
}
.opt-card:has(input:checked) span{color:var(--primary-dark);font-weight:700}
.opt-list .opt-card{justify-content:flex-start;padding:14px 16px;text-align:left}
.opt-list .opt-card span{font-size:14px}

/* ── ALERTS ── */
.alert{
  padding:12px 16px;border-radius:var(--radius-md);font-size:13px;
  margin-bottom:16px;border-left:3px solid;
  display:flex;align-items:center;gap:10px;
}
.alert-error{background:var(--danger-light);color:var(--danger);border-color:var(--danger)}
.alert-success{background:var(--success-light);color:var(--success);border-color:var(--success)}
.alert-info{background:var(--accent-light);color:var(--primary-dark);border-color:var(--primary)}
.alert-warning{background:var(--warning-light);color:var(--warning);border-color:var(--warning)}

/* ── ADMIN NAV ── */
.admin-nav{display:flex;gap:8px;margin-bottom:28px}
.admin-nav-btn{
  flex:1;padding:11px 6px;border:1.5px solid var(--border-medium);border-radius:var(--radius-md);
  background:var(--surface);font-size:13px;font-weight:700;font-family:var(--sans);
  color:var(--text-tertiary);cursor:pointer;transition:all .2s ease;text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.admin-nav-btn:hover,.admin-nav-btn.active{
  border-color:var(--primary);color:var(--primary);background:var(--accent-light);
}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  padding:12px 14px;text-align:left;border-bottom:2px solid var(--border-medium);
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-tertiary);background:var(--bg-secondary);
}
td{padding:13px 14px;border-bottom:1px solid var(--border-light);color:var(--text-secondary);vertical-align:middle}
tr:last-child td{border-bottom:none}

/* ── TYPE PILLS ── */
.type-pill{
  font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);
  font-weight:700;letter-spacing:.04em;display:inline-block;
}
.tp-text{background:var(--bg-tertiary);color:var(--text-tertiary)}
.tp-select{background:#EDE9FE;color:#5B21B6}

/* ── QUESTION ROW ── */
.q-row{padding:18px 0;border-bottom:1px solid var(--border-light)}
.q-row:last-child{border-bottom:none}
.q-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.q-num{font-size:12px;color:var(--primary);font-weight:700;min-width:24px;background:var(--accent-light);padding:4px 8px;border-radius:var(--radius-sm)}
.q-text{font-size:14px;color:var(--text-primary);white-space:pre-wrap;margin-bottom:10px;line-height:1.6;font-weight:600}
.q-opts{font-size:12px;color:var(--text-tertiary);margin-bottom:10px}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(28,28,26,.6);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(2px);
}
.modal{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius-lg);width:100%;max-width:500px;
  padding:0;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-xl);
}
.modal-head{
  padding:24px 28px 20px;
  border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg-secondary);
}
.modal-title{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--text-primary);letter-spacing:-.01em}
.modal-close{
  background:none;border:none;font-size:22px;cursor:pointer;
  color:var(--text-tertiary);line-height:1;padding:4px 6px;border-radius:var(--radius-sm);
  transition:all .2s ease;font-weight:700;
}
.modal-close:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.modal-body{padding:24px 28px 28px}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:56px 24px;color:var(--text-light)}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.5}
.empty p{font-size:14px;font-weight:500}
.loading{text-align:center;padding:48px 24px;color:var(--text-tertiary);font-size:14px}
.spin{
  width:20px;height:20px;border:2.5px solid var(--border-medium);border-top-color:var(--primary);
  border-radius:50%;animation:spin .8s linear infinite;
  display:inline-block;margin-right:10px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DIVIDER ── */
.div{border:none;border-top:1px solid var(--border-light);margin:24px 0}

/* ── PROGRESS ── */
.progress{
  width:100%;height:6px;background:var(--bg-tertiary);border-radius:3px;
  overflow:hidden;margin:16px 0;
}
.progress-bar{
  height:100%;background:linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
  transition:width .3s ease;
}

@media(max-width:480px){
  .pb{padding:20px 16px 60px}
  .topbar{padding:0 16px;height:52px}
  .btn-group{flex-direction:column}
  .btn-group .btn{width:100%}
  td .btn-group,.q-row .btn-group,.row .btn-group{flex-direction:row}
  td .btn-group .btn,.q-row .btn-group .btn,.row .btn-group .btn{width:auto}
  .admin-nav-btn{font-size:12px}
  .modal-head,.modal-body{padding-left:20px;padding-right:20px}
  .page-title{font-size:24px}
  .login-title{font-size:28px}
}
</style>
</head>
<body>
<div id="app">

<!-- ============ AUTH ============ -->
<div id="page-auth" class="page active">

  <div id="auth-user-block" class="login-outer">
    <div class="login-box">
      <div class="login-eyebrow">研修支援ツール</div>
      <h1 class="login-title">振り返りノート</h1>
      <p class="login-sub">学びの記録を積み重ねる。成長を可視化する。</p>
      <div class="login-form">
        <div id="auth-login-error"></div>
        <div class="fld">
          <label>ユーザー名</label>
          <input type="text" id="login-username" placeholder="username" autocomplete="username">
        </div>
        <div class="fld">
          <label>パスワード</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">ログイン</button>
        <hr class="login-divider">
        <p style="font-size:12px;color:var(--text-tertiary);text-align:center;margin-bottom:8px">アカウントは管理者にお問い合わせください</p>
        <button class="btn btn-ghost btn-full" onclick="showAdminLogin()">管理者ログイン</button>
      </div>
    </div>
  </div>

  <div id="auth-admin-block" class="login-outer" style="display:none">
    <div class="admin-login-box">
      <div class="admin-badge">管理者</div>
      <h1 class="admin-title">管理画面へのログイン</h1>
      <p class="admin-sub">管理者パスワードを入力してください</p>
      <div class="login-form">
        <div id="auth-admin-error"></div>
        <div class="fld">

<script>

var GAS_URL = 'https://script.google.com/macros/s/AKfycbwa9hD7G_OphQXQtA5fbBZ_imhAL87FIdmWMjfxtooLv91TfVYn6EA1m03AHDo1kWjJ/exec';
var ROUND_LABELS = {1:'初回',2:'1か月後',3:'3か月後'};
var state = {token:null,role:null,username:null,userId:null,currentTheme:null,currentRound:null,adminCurrentTheme:null,adminCurrentRound:1};

// ── API ──
function api(data) {
  data.token = state.token || null;
  return fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(data)
  })
  .then(function(r){ return r.json(); })
  .catch(function(e){ return {ok:false, error:'通信エラー: '+e.message}; });
}

// ── ページ制御 ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showUserLogin() {
  document.getElementById('auth-user-block').style.display = 'block';
  document.getElementById('auth-admin-block').style.display = 'none';
}
function showAdminLogin() {
  document.getElementById('auth-user-block').style.display = 'none';
  document.getElementById('auth-admin-block').style.display = 'block';
}
function switchHomeTab(tab) {
  var tabs = document.querySelectorAll('#page-home .tab-item');
  tabs[0].classList.toggle('active', tab==='answer');
  tabs[1].classList.toggle('active', tab==='history');
  document.getElementById('home-answer').style.display = tab==='answer' ? 'block' : 'none';
  document.getElementById('home-history').style.display = tab==='history' ? 'block' : 'none';
  if (tab==='history') loadHistoryThemes();
}
function adminTab(tab) {
  ['themes','questions','users','answers','answer-detail'].forEach(function(t){
    document.getElementById('admin-'+t).style.display='none';
  });
  if (tab==='themes')        { loadAdminThemes();          document.getElementById('admin-themes').style.display='block'; }
  if (tab==='questions')     {                             document.getElementById('admin-questions').style.display='block'; }
  if (tab==='users')         { loadAdminUsers();           document.getElementById('admin-users').style.display='block'; }
  if (tab==='answers')       { loadAdminAnswersUserList(); document.getElementById('admin-answers').style.display='block'; }
  if (tab==='answer-detail') {                             document.getElementById('admin-answer-detail').style.display='block'; }
}
function adminQRound(round) {
  state.adminCurrentRound = round;
  [1,2,3].forEach(function(r){ document.getElementById('q-tab-'+r).classList.toggle('active',r===round); });
  var w = document.getElementById('copy-from-round1-wrap');
  if (w) w.style.display = round===1 ? 'none' : 'block';
  loadAdminQuestions();
}

// ── 認証 ──
function setUser(data) {
  state.token = data.token; state.username = data.username||''; state.userId = data.userId||'';
  ['header-username','header-username2'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.textContent = data.username;
  });
}
function doLogin() {
  var u = document.getElementById('login-username').value.trim();
  var p = document.getElementById('login-password').value;
  if (!u||!p){ showError('auth-login-error','入力してください'); return; }
  showError('auth-login-error','');
  api({action:'login',username:u,password:p}).then(function(r){
    if (!r.ok){ showError('auth-login-error',r.error); return; }
    setUser(r); showPage('page-home'); loadAnswerThemes();
  });
}
function doAdminLogin() {
  var p = document.getElementById('admin-password').value;
  if (!p){ showError('auth-admin-error','パスワードを入力してください'); return; }
  showError('auth-admin-error','');
  api({action:'adminLogin',password:p}).then(function(r){
    if (!r.ok){ showError('auth-admin-error',r.error); return; }
    state.token = r.token; state.role = 'admin';
    showPage('page-admin'); adminTab('themes');
  });
}
function doLogout() {
  api({action:'logout'}).then(function(){
    state.token=null; state.role=null; showUserLogin(); showPage('page-auth');
  });
}

// ── テーマ一覧 ──
function loadAnswerThemes() {
  api({action:'getThemes'}).then(function(r){
    var el = document.getElementById('theme-list-answer');
    if (!r.ok||!r.themes||!r.themes.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>テーマがありません</p></div>'; return; }
    el.innerHTML = r.themes.map(function(t){
      return '<div class="theme-card" onclick="openAnswerTheme(\''+t.themeId+'\',\''+esc(t.themeName)+'\')">' +
        '<div class="theme-name">'+esc(t.themeName)+'</div>'+(t.description?'<div class="theme-desc">'+esc(t.description)+'</div>':'')+
        '<div style="color:var(--text-light);font-size:12px;margin-top:12px">クリックして回答を開始 →</div></div>';
    }).join('');
  });
}
function loadHistoryThemes() {
  api({action:'getThemes'}).then(function(r){
    var el = document.getElementById('theme-list-history');
    if (!r.ok||!r.themes||!r.themes.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>テーマがありません</p></div>'; return; }
    el.innerHTML = r.themes.map(function(t){
      return '<div class="theme-card" onclick="openHistoryTheme(\''+t.themeId+'\',\''+esc(t.themeName)+'\')">' +
        '<div class="theme-name">'+esc(t.themeName)+'</div>'+(t.description?'<div class="theme-desc">'+esc(t.description)+'</div>':'')+
        '<div style="color:var(--text-light);font-size:12px;margin-top:12px">履歴を表示 →</div></div>';
    }).join('');
  });
}

// ── 回答 ──
function openAnswerTheme(themeId, themeName) {
  state.currentTheme = themeId; state.currentRound = null;
  document.getElementById('answer-theme-name').textContent = themeName;
  document.getElementById('answer-questions').innerHTML = '';
  document.getElementById('answer-error').innerHTML = '';
  document.getElementById('answer-actions').style.display = 'none';
  var html = '<div class="fld"><label style="margin-bottom:12px">何回目の振り返りですか？</label><div class="opt-list">';
  [1,2,3].forEach(function(r){
    html += '<label class="opt-card"><input type="radio" name="round" value="'+r+'" onchange="selectRound('+r+')"><span>'+ROUND_LABELS[r]+'</span></label>';
  });
  html += '</div></div>';
  document.getElementById('answer-round-select').innerHTML = html;
  showPage('page-answer');
}
function selectRound(round) {
  state.currentRound = round;
  var el = document.getElementById('answer-questions');
  var actEl = document.getElementById('answer-actions');
  el.innerHTML = '<div class="loading"><span class="spin"></span>設問を読み込み中...</div>';
  document.getElementById('answer-error').innerHTML = '';
  actEl.style.display = 'none';
  api({action:'getQuestions',themeId:state.currentTheme,round:round}).then(function(r){
    if (!r.ok){ el.innerHTML='<div class="alert alert-error">'+esc(r.error)+'</div>'; return; }
    if (!r.questions||!r.questions.length){ el.innerHTML='<div class="alert alert-info">この回数の設問はまだ設定されていません。</div>'; return; }
    api({action:'getMyAnswers',themeId:state.currentTheme,round:round}).then(function(ar){
      var answered = ar.ok && ar.answers && ar.answers.some(function(a){ return a.answerText!==''; });
      if (answered){ el.innerHTML='<div class="alert alert-success">✅ この振り返りは回答済みです。</div>'+renderView(ar.answers); }
      else { el.innerHTML=renderForm(r.questions); actEl.style.display='block'; }
    });
  });
}
function renderForm(questions) {
  return questions.map(function(q,i){
    var html = '<div class="fld" data-qid="'+q.questionId+'"><label style="white-space:pre-wrap">'+escBr(q.questionText)+'</label>';
    if (q.questionType==='select'&&q.options) {
      var opts = String(q.options).split('\n').filter(function(o){ return o.trim(); });
      var short = opts.every(function(o){ return o.trim().length<=10; });
      html += '<div class="'+(short?'opt-grid':'opt-list')+'">' +
        opts.map(function(o){ return '<label class="opt-card"><input type="radio" name="q'+q.questionId+'" value="'+esc(o.split('=')[0].trim())+'"><span>'+esc(o.split('=')[1]||o)+'</span></label>'; }).join('') +
        '</div>';
    } else {
      html += '<textarea name="q'+q.questionId+'" placeholder="https://script.google.com/macros/s/AKfycbwa9hD7G_OphQXQtA5fbBZ_imhAL87FIdmWMjfxtooLv91TfVYn6EA1m03AHDo1kWjJ/exec"></textarea>';
    }
    html += '</div>';
    return html;
  }).join('');
}
function renderView(answers) {
  return answers.map(function(q){
    return '<div class="qa-block"><div class="qa-q">'+escBr(q.questionText)+'</div>' +
      '<div class="qa-a">'+(q.answerText?esc(q.answerText):'<span style="color:var(--text-light)">未回答</span>')+'</div></div>';
  }).join('');
}
function submitAnswers() {
  if (!state.currentRound){ showError('answer-error','回数を選択してください'); return; }
  var fields = document.querySelectorAll('#answer-questions [data-qid]');
  var answers=[]; var invalid=false;
  fields.forEach(function(f){
    var qid=f.dataset.qid;
    var ta=f.querySelector('textarea'); var rd=f.querySelector('input[type=radio]:checked');
    var val=ta?ta.value.trim():(rd?rd.value:'');
    if(!val) invalid=true;
    answers.push({questionId:qid,answerText:val});
  });
  if(invalid){ showError('answer-error','全ての設問に回答してください'); return; }
  api({action:'submitAnswers',themeId:state.currentTheme,round:state.currentRound,answers:answers}).then(function(r){
    if(!r.ok){ showError('answer-error',r.error); return; }
    document.getElementById('answer-questions').innerHTML='<div class="alert alert-success">✅ 回答を保存しました。</div>';
    document.getElementById('answer-actions').style.display='none';
    document.getElementById('answer-error').innerHTML='';
  });
}

// ── 履歴 ──
function openHistoryTheme(themeId, themeName) {
  state.currentTheme = themeId;
  document.getElementById('history-detail-theme').textContent = themeName+' の振り返り履歴';
  var el = document.getElementById('history-detail-content');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
  showPage('page-history-detail');
  api({action:'getMyThemeSummary',themeId:themeId}).then(function(r){
    if (!r.ok||!r.rounds||!r.rounds.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📝</div><p>まだ回答がありません</p></div>'; return; }
    el.innerHTML = r.rounds.map(function(round){
      return '<div class="accordion">' +
        '<div class="acc-head" onclick="toggleGroup(this)">' +
        '<span class="badge badge-primary">'+ROUND_LABELS[round]+'</span>' +
        '<span class="acc-chevron">▼</span></div>' +
        '<div class="acc-body" data-round="'+round+'"></div></div>';
    }).join('');
  });
}
function goBackToHistory(){ showPage('page-home'); switchHomeTab('history'); }
function toggleGroup(header) {
  var body=header.nextElementSibling; var isOpen=body.classList.contains('open');
  if (!isOpen&&body.innerHTML==='') {
    body.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
    body.classList.add('open');
    api({action:'getMyAnswers',themeId:state.currentTheme,round:body.dataset.round}).then(function(r){
      body.innerHTML = r.ok ? renderView(r.answers) : '<div class="alert alert-error">読み込み失敗</div>';
    });
  } else { body.classList.toggle('open',!isOpen); }
}

// ── 管理: テーマ ──
function loadAdminThemes() {
  api({action:'adminGetThemes'}).then(function(r){
    var el=document.getElementById('admin-theme-list');
    if (!r.ok||!r.themes||!r.themes.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>テーマがありません</p></div>'; return; }
    el.innerHTML = r.themes.map(function(t){
      return '<div class="card" style="margin-bottom:12px">' +
        '<div class="card-title">'+esc(t.themeName)+'</div>' +
        (t.description?'<div class="card-desc">'+esc(t.description)+'</div>':'') +
        '<div class="btn-group">' +
        '<button class="btn btn-secondary btn-sm" onclick="openQuestionsForTheme(\''+t.themeId+'\',\''+esc(t.themeName)+'\')">設問管理</button>' +
        '<button class="btn btn-secondary btn-sm" onclick="openThemeModal(\''+t.themeId+'\',\''+esc(t.themeName)+'\',\''+esc(t.description||'')+'\')">編集</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteTheme(\''+t.themeId+'\')">削除</button>' +
        '</div></div>';
    }).join('');
  });
}
function openThemeModal(id,name,desc){
  document.getElementById('modal-theme-id').value=id||'';
  document.getElementById('modal-theme-name').value=name||'';
  document.getElementById('modal-theme-desc').value=desc||'';
  document.getElementById('modal-theme-title').textContent=id?'テーマを編集':'テーマを追加';
  document.getElementById('modal-theme-error').innerHTML='';
  document.getElementById('modal-theme').style.display='flex';
}
function saveTheme(){
  var id=document.getElementById('modal-theme-id').value;
  var name=document.getElementById('modal-theme-name').value.trim();
  var desc=document.getElementById('modal-theme-desc').value.trim();
  if(!name){ showError('modal-theme-error','テーマ名を入力してください'); return; }
  api({action:'adminSaveTheme',themeId:id||null,themeName:name,description:desc}).then(function(r){
    if(!r.ok){ showError('modal-theme-error',r.error); return; }
    closeModal('modal-theme'); loadAdminThemes();
  });
}
function deleteTheme(id){ if(!confirm('このテーマを削除しますか？')) return; api({action:'adminDeleteTheme',themeId:id}).then(function(){ loadAdminThemes(); }); }

// ── 管理: 設問 ──
function openQuestionsForTheme(themeId,themeName){
  state.adminCurrentTheme=themeId; state.adminCurrentRound=1;
  document.getElementById('admin-q-theme-name').textContent=themeName+' の設問管理';
  [1,2,3].forEach(function(r){ document.getElementById('q-tab-'+r).classList.toggle('active',r===1); });
  document.getElementById('copy-from-round1-wrap').style.display='none';
  adminTab('questions'); loadAdminQuestions();
}
function loadAdminQuestions(){
  api({action:'adminGetQuestions',themeId:state.adminCurrentTheme,round:state.adminCurrentRound}).then(function(r){
    var el=document.getElementById('admin-question-list');
    if(!r.ok||!r.questions||!r.questions.length){ el.innerHTML='<div class="empty"><div class="empty-icon">❓</div><p>設問がありません</p></div>'; return; }
    el.innerHTML=r.questions.map(function(q){
      return '<div class="q-row"><div class="q-row-top"><div class="q-num">Q'+q.order+'</div></div>' +
        '<div class="q-text">'+escBr(q.questionText)+'</div>' +
        (q.questionType==='select'?'<div class="q-opts"><span class="type-pill tp-select">選択式</span></div>':'<div class="q-opts"><span class="type-pill tp-text">記述式</span></div>') +
        '<div class="btn-group"><button class="btn btn-secondary btn-sm" onclick="openQuestionModal(\''+q.questionId+'\',\''+esc(q.questionText)+'\',\''+q.questionType+'\',\''+esc(q.options||'')+'\','+q.order+')">編集</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteQuestion(\''+q.questionId+'\')">削除</button></div></div>';
    }).join('');
  });
}
function openQuestionModal(id,text,type,opts,order){
  document.getElementById('modal-q-id').value=id||'';
  document.getElementById('modal-q-text').value=text||'';
  document.getElementById('modal-q-order').value=order||'';
  setQType(type||'text');
  document.getElementById('modal-q-options').value=opts||'';
  document.getElementById('modal-q-title').textContent=id?'設問を編集':'設問を追加';
  document.getElementById('modal-q-error').innerHTML='';
  document.getElementById('modal-question').style.display='flex';
}
function setQType(t){
  document.getElementById('qtype-text-btn').classList.toggle('active',t==='text');
  document.getElementById('qtype-select-btn').classList.toggle('active',t==='select');
  document.getElementById('modal-q-options-wrap').style.display=t==='select'?'block':'none';
}
function insertTemplate(template){
  var opts='';
  if(template==='level5') opts='1=未着手\n2=意識あり\n3=実施中\n4=定着\n5=他者に指導できる';
  if(template==='agree4') opts='1=全く同意しない\n2=同意しない\n3=同意する\n4=強く同意する';
  if(template==='freq4') opts='1=ほぼ毎日\n2=週に数回\n3=月に数回\n4=ほぼなし';
  document.getElementById('modal-q-options').value=opts;
}
function saveQuestion(){
  var id=document.getElementById('modal-q-id').value;
  var text=document.getElementById('modal-q-text').value.trim();
  var order=document.getElementById('modal-q-order').value;
  var type=document.getElementById('qtype-text-btn').classList.contains('active')?'text':'select';
  var opts=type==='select'?document.getElementById('modal-q-options').value.trim():'';
  if(!text){ showError('modal-q-error','設問を入力してください'); return; }
  if(type==='select'&&!opts){ showError('modal-q-error','選択肢を入力してください'); return; }
  api({action:'adminSaveQuestion',questionId:id||null,themeId:state.adminCurrentTheme,round:state.adminCurrentRound,questionText:text,questionType:type,options:opts,order:order||1}).then(function(r){
    if(!r.ok){ showError('modal-q-error',r.error); return; }
    closeModal('modal-question'); loadAdminQuestions();
  });
}
function deleteQuestion(id){ if(!confirm('この設問を削除しますか？')) return; api({action:'adminDeleteQuestion',questionId:id}).then(function(){ loadAdminQuestions(); }); }
function copyFromRound1(){
  api({action:'adminCopyQuestions',themeId:state.adminCurrentTheme,fromRound:1,toRound:state.adminCurrentRound}).then(function(r){
    if(!r.ok){ alert(r.error); return; }
    loadAdminQuestions();
  });
}

// ── 管理: ユーザー ──
function loadAdminUsers(){
  api({action:'adminGetUsers'}).then(function(r){
    var el=document.getElementById('admin-user-list');
    if(!r.ok||!r.users||!r.users.length){ el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><p>ユーザーがありません</p></div>'; return; }
    el.innerHTML=r.users.map(function(u){
      return '<div class="row"><div><div class="row-title">'+esc(u.username)+'</div></div>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteUser(\''+u.userId+'\')">削除</button></div>';
    }).join('');
  });
}
function openCreateUserModal(){
  document.getElementById('new-user-name').value='';
  document.getElementById('new-user-pass').value='';
  document.getElementById('modal-user-error').innerHTML='';
  document.getElementById('modal-create-user').style.display='flex';
}
function adminCreateUser(){
  var name=document.getElementById('new-user-name').value.trim();
  var pass=document.getElementById('new-user-pass').value;
  if(!name||!pass){ showError('modal-user-error','入力してください'); return; }
  api({action:'adminCreateUser',username:name,password:pass}).then(function(r){
    if(!r.ok){ showError('modal-user-error',r.error); return; }
    closeModal('modal-create-user'); loadAdminUsers();
  });
}
function deleteUser(id){ if(!confirm('このユーザーを削除しますか？')) return; api({action:'adminDeleteUser',userId:id}).then(function(){ loadAdminUsers(); }); }

// ── 管理: 回答確認 ──
function loadAdminAnswersUserList(){
  api({action:'adminGetAnswersUserList'}).then(function(r){
    var el=document.getElementById('admin-answers-content');
    if(!r.ok||!r.users||!r.users.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📊</div><p>回答データがありません</p></div>'; return; }
    el.innerHTML=r.users.map(function(u){
      return '<div class="row row-clickable" onclick="openAdminAnswerDetail(\''+u.userId+'\',\''+esc(u.username)+'\')">' +
        '<div class="row-title">'+esc(u.username)+'</div><div class="row-arrow">›</div></div>';
    }).join('');
  });
}
function openAdminAnswerDetail(userId,username){
  state.adminCurrentUserId=userId;
  document.getElementById('admin-detail-username').textContent=username+' の回答';
  var el=document.getElementById('admin-detail-content');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
  adminTab('answer-detail');
  api({action:'adminGetUserAnswers',userId:userId}).then(function(r){
    if(!r.ok||!r.themes||!r.themes.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📝</div><p>回答がありません</p></div>'; return; }
    el.innerHTML=r.themes.map(function(t){
      return '<div class="accordion">' +
        '<div class="acc-head" onclick="toggleAdminAnswerGroup(this)">' +
        '<span>'+esc(t.themeName)+'</span>' +
        '<span class="acc-chevron">▼</span></div>' +
        '<div class="acc-body" data-theme="'+t.themeId+'"></div></div>';
    }).join('');
  });
}
function toggleAdminAnswerGroup(header){
  var body=header.nextElementSibling; var isOpen=body.classList.contains('open');
  if(!isOpen&&body.innerHTML===''){
    body.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
    body.classList.add('open');
    api({action:'adminGetUserThemeAnswers',userId:state.adminCurrentUserId,themeId:body.dataset.theme}).then(function(r){
      body.innerHTML=r.ok?r.rounds.map(function(round){
        return '<div class="accordion" style="margin-bottom:8px;border:none;box-shadow:none">' +
          '<div class="acc-head" onclick="toggleAdminRoundAnswers(this)" style="background:var(--bg-primary);padding:10px 14px">' +
          '<span class="badge badge-secondary" style="font-size:11px">'+ROUND_LABELS[round.round]+'</span>' +
          '<span class="acc-chevron">▼</span></div>' +
          '<div class="acc-body" style="padding:14px;border:none" data-round="'+round.round+'">'+renderView(round.answers)+'</div></div>';
      }).join(''):'<div class="alert alert-error">読み込み失敗</div>';
    });
  }else{ body.classList.toggle('open',!isOpen); }
}
function toggleAdminRoundAnswers(header){
  var body=header.nextElementSibling;
  body.classList.toggle('open');
}

// ── ユーティリティ ──
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escBr(s){ return esc(s).replace(/\n/g,'<br>'); }
function showError(id,msg){ document.getElementById(id).innerHTML=msg?'<div class="alert alert-error">'+esc(msg)+'</div>':''; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

// ── 初期化 ──
window.addEventListener('DOMContentLoaded',function(){
  document.getElementById('modal-theme').style.display='none';
  document.getElementById('modal-question').style.display='none';
  document.getElementById('modal-create-user').style.display='none';
});

</script>
</body>
</html>
