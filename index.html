<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>振り返りノート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-900:#1B4332;
  --green-800:#2D6A4F;
  --green-700:#40916C;
  --green-600:#52B788;
  --green-100:#D8F3DC;
  --green-50:#F0FBF2;
  --ink:#1A1A1A;
  --ink-2:#444;
  --ink-3:#767676;
  --ink-4:#A8A8A8;
  --line:#E2E8E4;
  --line-2:#C8D4CB;
  --surface:#FFFFFF;
  --bg:#F4F6F4;
  --danger:#C0392B;
  --danger-bg:#FEF2F0;
  --success:#1B7340;
  --success-bg:#F0FBF2;
  --shadow-sm:0 1px 2px rgba(45,106,79,.06);
  --shadow:0 2px 8px rgba(45,106,79,.08);
}
body{
  font-family:'Noto Sans JP','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.7;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:600px;margin:0 auto;padding:0 0 40px}
.page{display:none}.page.active{display:block}

/* ── Top bar ── */
.topbar{
  background:var(--green-900);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.topbar-brand{
  font-size:15px;font-weight:700;
  color:#fff;letter-spacing:.04em;
  display:flex;align-items:center;gap:8px;
}
.topbar-brand svg{opacity:.85}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-user{font-size:12px;color:rgba(255,255,255,.65)}
.topbar-logout{
  font-size:12px;color:rgba(255,255,255,.55);background:none;
  border:1px solid rgba(255,255,255,.2);border-radius:4px;
  padding:3px 10px;cursor:pointer;transition:.15s;
}
.topbar-logout:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── Login ── */
.login-wrap{padding:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#1B4332 0%,#2D6A4F 60%,#52B788 100%)}
.login-hero{text-align:center;padding:32px 0 24px}
.login-icon{
  width:56px;height:56px;background:var(--green-800);border-radius:14px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
}
.login-icon svg{color:#fff}
.login-title{font-size:24px;font-weight:700;color:#fff;letter-spacing:.02em;text-shadow:0 1px 4px rgba(0,0,0,.2)}
.login-sub{font-size:13px;color:var(--ink-3);margin-top:6px}

.panel{
  background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:24px;margin-bottom:16px;
  box-shadow:var(--shadow-sm);
}
.panel-label{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  color:var(--ink-3);text-transform:uppercase;margin-bottom:18px;
  padding-bottom:10px;border-bottom:1px solid var(--line);
}
.admin-panel-header{
  background:var(--green-900);border-radius:10px 10px 0 0;
  padding:20px 24px;margin:-28px -28px 20px;
}
.admin-panel-header .badge{
  display:inline-block;background:var(--green-700);color:#fff;
  font-size:10px;font-weight:700;letter-spacing:.1em;padding:2px 8px;
  border-radius:3px;margin-bottom:8px;
}
.admin-panel-header .title{font-size:18px;font-weight:700;color:#fff}
.admin-panel-header .sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px}

/* ── Form elements ── */
.fld{margin-bottom:18px}
.fld label{
  display:block;font-size:12px;font-weight:700;
  color:var(--ink-2);letter-spacing:.04em;margin-bottom:7px;
}
.fld input,.fld textarea,.fld select{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--line-2);border-radius:8px;
  font-size:15px;font-family:inherit;
  color:var(--ink);background:var(--surface);
  transition:border-color .15s;
  -webkit-appearance:none;
}
.fld input:focus,.fld textarea:focus{
  outline:none;border-color:var(--green-700);
  box-shadow:0 0 0 3px rgba(64,145,108,.12);
}
.fld textarea{resize:vertical;min-height:80px}
.fld .note{font-size:12px;color:var(--ink-4);margin-top:5px}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 22px;border-radius:8px;border:none;
  font-size:14px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:.15s;white-space:nowrap;
  letter-spacing:.02em;-webkit-tap-highlight-color:transparent;
}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.98)}
.btn-primary{background:var(--green-800);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--green-900)}
.btn-outline{
  background:transparent;color:var(--green-800);
  border:1.5px solid var(--green-700);
}
.btn-outline:hover:not(:disabled){background:var(--green-50)}
.btn-ghost{background:transparent;color:var(--ink-3);border:1.5px solid var(--line-2)}
.btn-ghost:hover:not(:disabled){background:var(--bg);color:var(--ink-2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover:not(:disabled){background:#A93226}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:6px}
.btn-full{width:100%}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* ── Tabs ── */
.tab-bar{
  display:flex;border-bottom:2px solid var(--line);
  margin-bottom:20px;gap:0;
}
.tab-item{
  flex:1;padding:11px 8px;border:none;background:none;
  font-size:13px;font-weight:700;font-family:inherit;
  color:var(--ink-4);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:.15s;letter-spacing:.02em;
  -webkit-tap-highlight-color:transparent;
}
.tab-item.active{color:var(--green-800);border-bottom-color:var(--green-800)}
.tab-item:hover:not(.active){color:var(--ink-2)}

/* ── Segment (round select) ── */
.segment{display:flex;background:var(--bg);border:1px solid var(--line-2);border-radius:10px;padding:3px;gap:3px;margin-bottom:20px}
.seg-btn{
  flex:1;padding:9px 4px;border:none;background:none;border-radius:7px;
  font-size:13px;font-weight:700;font-family:inherit;color:var(--ink-3);
  cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent;
}
.seg-btn.active{background:var(--surface);color:var(--green-800);box-shadow:var(--shadow-sm)}

/* ── Page body padding ── */
.page-body{padding:0 20px}

/* ── Section heading ── */
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.sec-title{font-size:13px;font-weight:700;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase}

/* ── Theme rows ── */
.theme-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;border-bottom:1px solid var(--line);gap:12px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.theme-row:last-child{border-bottom:none}
.theme-row:active{opacity:.7}
.theme-row-left .name{font-size:15px;font-weight:700;color:var(--ink)}
.theme-row-left .desc{font-size:12px;color:var(--ink-4);margin-top:2px}
.theme-row-arrow{color:var(--line-2);font-size:18px;flex-shrink:0}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:20px;margin-bottom:14px;
  box-shadow:var(--shadow-sm);
}
.card-title{font-size:16px;font-weight:700;color:var(--green-900);margin-bottom:16px}

/* ── Round badges ── */
.rbadge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;
}
.rb-1{background:var(--green-100);color:var(--green-900)}
.rb-2{background:#D5E8F0;color:#1A4A5E}
.rb-3{background:#F0EAD5;color:#5C4A1A}

/* ── Q&A display ── */
.qa-block{padding:14px 0;border-bottom:1px solid var(--line)}
.qa-block:last-child{border-bottom:none}
.qa-q{
  font-size:12px;font-weight:700;color:var(--ink-3);
  letter-spacing:.04em;margin-bottom:6px;white-space:pre-wrap;
}
.qa-a{font-size:15px;color:var(--ink);white-space:pre-wrap;line-height:1.7}

/* ── Accordion ── */
.accordion{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:10px}
.acc-head{
  padding:13px 16px;background:var(--bg);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;gap:8px;-webkit-tap-highlight-color:transparent;
}
.acc-head:active{background:var(--line)}
.acc-chevron{color:var(--ink-4);font-size:14px;transition:transform .2s;flex-shrink:0}
.acc-head.open .acc-chevron{transform:rotate(180deg)}
.acc-body{padding:16px;border-top:1px solid var(--line);display:none}
.acc-body.open{display:block}

/* ── Options ── */
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.opt-card{
  display:flex;align-items:center;justify-content:center;
  padding:12px 8px;border:1.5px solid var(--line-2);border-radius:8px;
  cursor:pointer;transition:.15s;text-align:center;min-height:48px;
  position:relative;-webkit-tap-highlight-color:transparent;
  background:var(--surface);
}
.opt-card input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.opt-card span{font-size:13px;font-weight:500;color:var(--ink-2);line-height:1.4}
.opt-card:has(input:checked){
  border-color:var(--green-800);background:var(--green-100);
  box-shadow:inset 0 0 0 1px var(--green-700);
}
.opt-card:has(input:checked) span{color:var(--green-900);font-weight:700}
.opt-list .opt-card{justify-content:flex-start;padding:12px 16px;text-align:left}
.opt-list .opt-card span{font-size:14px}

/* ── Alerts ── */
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;border-left:3px solid}
.alert-error{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
.alert-success{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.alert-info{background:var(--green-50);color:var(--green-800);border-color:var(--green-600)}

/* ── Admin nav ── */
.admin-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.admin-tab{
  padding:10px 4px;border:1.5px solid var(--line-2);border-radius:8px;
  background:var(--surface);font-size:13px;font-weight:700;font-family:inherit;
  color:var(--ink-3);cursor:pointer;transition:.15s;text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.admin-tab.active,.admin-tab:hover{border-color:var(--green-700);color:var(--green-800);background:var(--green-50)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  background:var(--bg);padding:9px 12px;text-align:left;
  color:var(--ink-3);font-weight:700;font-size:11px;letter-spacing:.06em;
  border-bottom:2px solid var(--line-2);text-transform:uppercase;
}
td{padding:11px 12px;border-bottom:1px solid var(--line);color:var(--ink-2);vertical-align:middle}
tr:last-child td{border-bottom:none}

/* ── Type badge ── */
.type-pill{
  font-size:11px;padding:2px 8px;border-radius:3px;
  font-weight:700;letter-spacing:.04em;display:inline-block;
}
.tp-text{background:var(--bg);color:var(--ink-3);border:1px solid var(--line-2)}
.tp-select{background:#EDE9FE;color:#5B21B6}

/* ── Q row in admin ── */
.q-row{padding:14px 0;border-bottom:1px solid var(--line)}
.q-row:last-child{border-bottom:none}
.q-row-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.q-num{font-size:12px;color:var(--ink-4);font-weight:700;min-width:20px}
.q-text{font-size:14px;color:var(--ink);white-space:pre-wrap;margin-bottom:8px}
.q-opts{font-size:12px;color:var(--ink-4);margin-bottom:8px}

/* ── Modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--surface);border-radius:14px;width:100%;max-width:480px;
  padding:24px;max-height:90vh;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line);
}
.modal-title{font-size:16px;font-weight:700;color:var(--green-900)}
.modal-close{
  background:none;border:none;font-size:22px;cursor:pointer;
  color:var(--ink-4);line-height:1;padding:2px;
}

/* ── Divider ── */
.divider{border:none;border-top:1px solid var(--line);margin:16px 0}

/* ── Empty / Loading ── */
.empty{text-align:center;padding:40px 16px;color:var(--ink-4)}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.5}
.empty p{font-size:14px}
.loading{text-align:center;padding:32px;color:var(--ink-4);font-size:14px}
.spin{
  width:22px;height:22px;border:2.5px solid var(--line-2);border-top-color:var(--green-700);
  border-radius:50%;animation:spin .7s linear infinite;
  display:inline-block;margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Back link ── */
.back-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:13px;font-weight:700;color:var(--green-700);
  background:none;border:none;cursor:pointer;padding:0;
  margin-bottom:16px;-webkit-tap-highlight-color:transparent;
  letter-spacing:.02em;
}
.back-link:hover{color:var(--green-900)}

/* ── Admin section header ── */
.section-bar{
  background:var(--green-900);color:#fff;
  padding:12px 20px;margin:0 -20px 20px;
  font-size:12px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;
}

@media(max-width:480px){
  .btn-group{flex-direction:column}
  .btn-group .btn{width:100%}
  td .btn-group,.q-row .btn-group{flex-direction:row}
  td .btn-group .btn,.q-row .btn-group .btn{width:auto}
  .modal{border-radius:14px}
}
</style>
</head>
<body>
<div id="app">

<!-- ============ LOGIN ============ -->
<div id="page-auth" class="page active">
  <div class="login-wrap">

    <div id="auth-user-block">
      <div class="login-hero">
        <div class="login-icon">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <path d="M9 12h6M9 16h4"/>
          </svg>
        </div>
        <div class="login-title">振り返りノート</div>
        <div class="login-sub">研修の学びを記録・積み重ねるツール</div>
      </div>
      <div class="panel">
        <div class="panel-label">スタッフログイン</div>
        <div id="auth-login-error"></div>
        <div class="fld">
          <label>ユーザー名</label>
          <input type="text" id="login-username" placeholder="ユーザー名を入力" autocomplete="username">
        </div>
        <div class="fld">
          <label>パスワード</label>
          <input type="password" id="login-password" placeholder="パスワードを入力" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">ログイン</button>
        <p style="font-size:12px;color:var(--ink-4);text-align:center;margin-top:14px">
          アカウントは管理者にお問い合わせください
        </p>
        <hr class="divider">
        <div style="text-align:center">
          <button onclick="showAdminLogin()" style="font-size:12px;color:var(--ink-3);background:none;border:none;cursor:pointer;text-decoration:underline">管理者の方はこちら</button>
        </div>
      </div>
    </div>

    <div id="auth-admin-block" style="display:none">
      <div style="margin-bottom:24px;text-align:center;padding-top:0">
        <div style="font-size:13px;font-weight:700;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">管理者ポータル</div>
        <div style="font-size:22px;font-weight:700;color:var(--green-900)">振り返りノート</div>
      </div>
      <div class="panel">
        <div class="admin-panel-header">
          <div class="badge">ADMIN ACCESS</div>
          <div class="title">管理者認証</div>
          <div class="sub">管理パスワードを入力してください</div>
        </div>
        <div id="auth-admin-error"></div>
        <div class="fld">
          <label>管理パスワード</label>
          <input type="password" id="admin-password" placeholder="パスワードを入力" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full" onclick="doAdminLogin()">管理画面へログイン</button>
        <div style="text-align:center;margin-top:14px">
          <button onclick="showUserLogin()" style="font-size:12px;color:var(--ink-4);background:none;border:none;cursor:pointer">← スタッフ用ログインへ戻る</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ============ USER: HOME ============ -->
<div id="page-home" class="page">
  <div class="topbar">
    <div class="topbar-brand">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
      </svg>
      振り返りノート <span style="font-size:10px;font-weight:400;opacity:.45;letter-spacing:0">v1.4</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="header-username"></span>
      <button class="topbar-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="page-body" style="padding-top:20px">
    <div class="tab-bar">
      <button class="tab-item active" onclick="switchHomeTab('answer')">振り返りを記録</button>
      <button class="tab-item" onclick="switchHomeTab('history')">過去の回答</button>
    </div>
    <div id="home-answer">
      <div class="sec-head"><span class="sec-title">テーマを選択</span></div>
      <div class="card" style="padding:8px 16px">
        <div id="theme-list-answer"><div class="loading"><span class="spin"></span>読み込み中...</div></div>
      </div>
    </div>
    <div id="home-history" style="display:none">
      <div class="sec-head"><span class="sec-title">振り返り履歴</span></div>
      <div class="card" style="padding:8px 16px">
        <div id="theme-list-history"><div class="loading"><span class="spin"></span>読み込み中...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- ============ USER: ANSWER ============ -->
<div id="page-answer" class="page">
  <div class="topbar">
    <div class="topbar-brand">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
      </svg>
      振り返りノート <span style="font-size:10px;font-weight:400;opacity:.45;letter-spacing:0">v1.4</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="header-username2"></span>
      <button class="topbar-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="page-body" style="padding-top:20px">
    <button class="back-link" onclick="showPage('page-home')">← テーマ一覧へ</button>
    <div id="answer-theme-name" class="card-title" style="font-size:18px;margin-bottom:4px"></div>
    <div style="font-size:13px;color:var(--ink-3);margin-bottom:20px">何回目の振り返りかを選んで回答してください</div>
    <div id="answer-round-select"></div>
    <div id="answer-questions"></div>
    <div id="answer-error"></div>
    <div id="answer-actions" style="display:none;margin-top:20px">
      <button class="btn btn-primary btn-full" onclick="submitAnswers()">回答を送信する</button>
    </div>
  </div>
</div>

<!-- ============ USER: HISTORY DETAIL ============ -->
<div id="page-history-detail" class="page">
  <div class="topbar">
    <div class="topbar-brand">

<script>

var GAS_URL = 'https://script.google.com/macros/s/AKfycbwa9hD7G_OphQXQtA5fbBZ_imhAL87FIdmWMjfxtooLv91TfVYn6EA1m03AHDo1kWjJ/exec';
var ROUND_LABELS = {1:'初回',2:'1か月後',3:'3か月後'};
var state = {token:null,role:null,username:null,userId:null,currentTheme:null,currentRound:null,adminCurrentTheme:null,adminCurrentRound:1};

// ── GAS URL管理 ──


// ── API ──
function api(data) {
  data.token = state.token || null;
  return fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(data)
  })
  .then(function(r){ return r.json(); })
  .catch(function(e){ return {ok:false, error:'通信エラー: '+e.message}; });
}

// ── ページ制御 ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showUserLogin() {
  document.getElementById('auth-user-block').style.display = 'block';
  document.getElementById('auth-admin-block').style.display = 'none';
}
function showAdminLogin() {
  document.getElementById('auth-user-block').style.display = 'none';
  document.getElementById('auth-admin-block').style.display = 'block';
}
function switchHomeTab(tab) {
  var tabs = document.querySelectorAll('#page-home .tabs .tab-btn');
  tabs[0].classList.toggle('active', tab==='answer');
  tabs[1].classList.toggle('active', tab==='history');
  document.getElementById('home-answer').style.display = tab==='answer' ? 'block' : 'none';
  document.getElementById('home-history').style.display = tab==='history' ? 'block' : 'none';
  if (tab==='history') loadHistoryThemes();
}
function adminTab(tab) {
  ['themes','questions','users','answers','answer-detail'].forEach(function(t){
    document.getElementById('admin-'+t).style.display='none';
  });
  if (tab==='themes')        { loadAdminThemes();          document.getElementById('admin-themes').style.display='block'; }
  if (tab==='questions')     {                             document.getElementById('admin-questions').style.display='block'; }
  if (tab==='users')         { loadAdminUsers();           document.getElementById('admin-users').style.display='block'; }
  if (tab==='answers')       { loadAdminAnswersUserList(); document.getElementById('admin-answers').style.display='block'; }
  if (tab==='answer-detail') {                             document.getElementById('admin-answer-detail').style.display='block'; }
}
function adminQRound(round) {
  state.adminCurrentRound = round;
  [1,2,3].forEach(function(r){ document.getElementById('q-tab-'+r).classList.toggle('active',r===round); });
  var w = document.getElementById('copy-from-round1-wrap');
  if (w) w.style.display = round===1 ? 'none' : 'block';
  loadAdminQuestions();
}

// ── 認証 ──
function setUser(data) {
  state.token = data.token; state.username = data.username||''; state.userId = data.userId||'';
  ['header-username','header-username2','header-username3'].forEach(function(id){
    document.getElementById(id).textContent = data.username;
  });
}
function doLogin() {
  var u = document.getElementById('login-username').value.trim();
  var p = document.getElementById('login-password').value;
  if (!u||!p){ showError('auth-login-error','入力してください'); return; }
  showError('auth-login-error','');
  api({action:'login',username:u,password:p}).then(function(r){
    if (!r.ok){ showError('auth-login-error',r.error); return; }
    setUser(r); showPage('page-home'); loadAnswerThemes();
  });
}
function doAdminLogin() {
  var p = document.getElementById('admin-password').value;
  if (!p){ showError('auth-admin-error','パスワードを入力してください'); return; }
  showError('auth-admin-error','');
  api({action:'adminLogin',password:p}).then(function(r){
    if (!r.ok){ showError('auth-admin-error',r.error); return; }
    state.token = r.token; state.role = 'admin';
    showPage('page-admin'); adminTab('themes');
  });
}
function doLogout() {
  api({action:'logout'}).then(function(){
    state.token=null; state.role=null; showUserLogin(); showPage('page-auth');
  });
}

// ── テーマ一覧 ──
function loadAnswerThemes() {
  api({action:'getThemes'}).then(function(r){
    var el = document.getElementById('theme-list-answer');
    if (!r.ok||!r.themes||!r.themes.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>テーマがありません</p></div>'; return; }
    el.innerHTML = r.themes.map(function(t){
      return '<div class="theme-row" onclick="openAnswerTheme(\''+t.themeId+'\',\''+esc(t.themeName)+'\')">' +
        '<div class="theme-row-left"><div class="name">'+esc(t.themeName)+'</div>'+(t.description?'<div class="desc">'+esc(t.description)+'</div>':'')+
        '</div><div class="theme-row-arrow">›</div></div>';
    }).join('');
  });
}
function loadHistoryThemes() {
  api({action:'getThemes'}).then(function(r){
    var el = document.getElementById('theme-list-history');
    if (!r.ok||!r.themes||!r.themes.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>テーマがありません</p></div>'; return; }
    el.innerHTML = r.themes.map(function(t){
      return '<div class="theme-row" onclick="openHistoryTheme(\''+t.themeId+'\',\''+esc(t.themeName)+'\')">' +
        '<div class="theme-row-left"><div class="name">'+esc(t.themeName)+'</div>'+(t.description?'<div class="desc">'+esc(t.description)+'</div>':'')+
        '</div><div class="theme-row-arrow">›</div></div>';
    }).join('');
  });
}

// ── 回答 ──
function openAnswerTheme(themeId, themeName) {
  state.currentTheme = themeId; state.currentRound = null;
  document.getElementById('answer-theme-name').textContent = themeName;
  document.getElementById('answer-questions').innerHTML = '';
  document.getElementById('answer-error').innerHTML = '';
  document.getElementById('answer-actions').style.display = 'none';
  var html = '<div class="field"><label style="margin-bottom:8px">何回目の振り返りですか？</label><div class="opt-list">';
  [1,2,3].forEach(function(r){
    html += '<label class="opt-card"><input type="radio" name="round" value="'+r+'" onchange="selectRound('+r+')"><span>'+ROUND_LABELS[r]+'</span></label>';
  });
  html += '</div></div>';
  document.getElementById('answer-round-select').innerHTML = html;
  showPage('page-answer');
}
function selectRound(round) {
  state.currentRound = round;
  var el = document.getElementById('answer-questions');
  var actEl = document.getElementById('answer-actions');
  el.innerHTML = '<div class="loading"><span class="spin"></span>設問を読み込み中...</div>';
  document.getElementById('answer-error').innerHTML = '';
  actEl.style.display = 'none';
  api({action:'getQuestions',themeId:state.currentTheme,round:round}).then(function(r){
    if (!r.ok){ el.innerHTML='<div class="alert alert-error">'+esc(r.error)+'</div>'; return; }
    if (!r.questions||!r.questions.length){ el.innerHTML='<div class="alert alert-info">この回数の設問はまだ設定されていません。</div>'; return; }
    api({action:'getMyAnswers',themeId:state.currentTheme,round:round}).then(function(ar){
      var answered = ar.ok && ar.answers && ar.answers.some(function(a){ return a.answerText!==''; });
      if (answered){ el.innerHTML='<div class="alert alert-success">この振り返りは回答済みです。</div>'+renderView(ar.answers); }
      else { el.innerHTML=renderForm(r.questions); actEl.style.display='block'; }
    });
  });
}
function renderForm(questions) {
  return questions.map(function(q){
    var html = '<div class="field" data-qid="'+q.questionId+'"><label style="white-space:pre-wrap">'+escBr(q.questionText)+'</label>';
    if (q.questionType==='select'&&q.options) {
      var opts = String(q.options).split('\n').filter(function(o){ return o.trim(); });
      var short = opts.every(function(o){ return o.trim().length<=10; });
      html += '<div class="'+listStyle+'">' +
        opts.map(function(o){ return '<label class="opt-item"><input type="radio" name="q_'+q.questionId+'" value="'+esc(o.trim())+'"><span>'+esc(o.trim())+'</span></label>'; }).join('') + '</div>';
    } else {
      html += '<textarea placeholder="回答を入力してください"></textarea>';
    }
    return html+'</div>';
  }).join('');
}
function renderView(answers) {
  return answers.map(function(q){
    return '<div class="qa-item"><div class="qa-q">'+escBr(q.questionText)+'</div>' +
      '<div class="qa-a">'+(q.answerText?esc(q.answerText):'<span style="color:var(--gray-300)">未回答</span>')+'</div></div>';
  }).join('');
}
function submitAnswers() {
  if (!state.currentRound){ showError('answer-error','回数を選択してください'); return; }
  var fields = document.querySelectorAll('#answer-questions [data-qid]');
  var answers=[]; var invalid=false;
  fields.forEach(function(f){
    var qid=f.dataset.qid;
    var ta=f.querySelector('textarea'); var rd=f.querySelector('input[type=radio]:checked');
    var val=ta?ta.value.trim():(rd?rd.value:'');
    if(!val) invalid=true;
    answers.push({questionId:qid,answerText:val});
  });
  if(invalid){ showError('answer-error','全ての設問に回答してください'); return; }
  api({action:'submitAnswers',themeId:state.currentTheme,round:state.currentRound,answers:answers}).then(function(r){
    if(!r.ok){ showError('answer-error',r.error); return; }
    document.getElementById('answer-questions').innerHTML='<div class="alert alert-success">✅ 回答を保存しました。</div>';
    document.getElementById('answer-actions').style.display='none';
    document.getElementById('answer-error').innerHTML='';
  });
}

// ── 履歴 ──
function openHistoryTheme(themeId, themeName) {
  state.currentTheme = themeId;
  document.getElementById('history-detail-theme').textContent = themeName+' の振り返り履歴';
  var el = document.getElementById('history-detail-content');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
  showPage('page-history-detail');
  api({action:'getMyThemeSummary',themeId:themeId}).then(function(r){
    if (!r.ok||!r.rounds||!r.rounds.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📝</div><p>まだ回答がありません</p></div>'; return; }
    el.innerHTML = r.rounds.map(function(round){
      return '<div class="accordion">'  +
        '<div class="acc-head" onclick="toggleGroup(this)">'  +
        '<div style="display:flex;align-items:center;gap:8px"><span class="round-badge round-'+round+'">'+ROUND_LABELS[round]+'</span></div>' +
        '<span style="color:var(--gray-300)">▼</span></div>' +
        '<div class="history-group-body" data-round="'+round+'"></div></div>';
    }).join('');
  });
}
function goBackToHistory(){ showPage('page-home'); switchHomeTab('history'); }
function toggleGroup(header) {
  var body=header.nextElementSibling; var isOpen=body.classList.contains('open');
  if (!isOpen&&body.innerHTML==='') {
    body.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
    body.classList.add('open');
    api({action:'getMyAnswers',themeId:state.currentTheme,round:body.dataset.round}).then(function(r){
      body.innerHTML = r.ok ? renderView(r.answers) : '<div class="alert alert-error">読み込み失敗</div>';
    });
  } else { body.classList.toggle('open',!isOpen); }
}

// ── 管理: テーマ ──
function loadAdminThemes() {
  api({action:'adminGetThemes'}).then(function(r){
    var el=document.getElementById('admin-theme-list');
    if (!r.ok||!r.themes||!r.themes.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>テーマがありません</p></div>'; return; }
    el.innerHTML = r.themes.map(function(t){
      return '<div class="theme-row" style="cursor:default">' +
        '<div style="font-weight:600;margin-bottom:6px">'+esc(t.themeName)+'</div>' +
        (t.description?'<div style="font-size:12px;color:var(--gray-400);margin-bottom:8px">'+esc(t.description)+'</div>':'') +
        '<div class="btn-group">' +
        '<button class="btn btn-secondary btn-sm" onclick="openQuestionsForTheme(\''+t.themeId+'\',\''+esc(t.themeName)+'\')">設問管理</button>' +
        '<button class="btn btn-secondary btn-sm" onclick="openThemeModal(\''+t.themeId+'\',\''+esc(t.themeName)+'\',\''+esc(t.description||'')+'\')">編集</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteTheme(\''+t.themeId+'\')">削除</button>' +
        '</div></div>';
    }).join('');
  });
}
function openThemeModal(id,name,desc){
  document.getElementById('modal-theme-id').value=id||'';
  document.getElementById('modal-theme-name').value=name||'';
  document.getElementById('modal-theme-desc').value=desc||'';
  document.getElementById('modal-theme-title').textContent=id?'テーマを編集':'テーマを追加';
  document.getElementById('modal-theme-error').innerHTML='';
  document.getElementById('modal-theme').style.display='flex';
}
function saveTheme(){
  var id=document.getElementById('modal-theme-id').value;
  var name=document.getElementById('modal-theme-name').value.trim();
  var desc=document.getElementById('modal-theme-desc').value.trim();
  if(!name){ showError('modal-theme-error','テーマ名を入力してください'); return; }
  api({action:'adminSaveTheme',themeId:id||null,themeName:name,description:desc}).then(function(r){
    if(!r.ok){ showError('modal-theme-error',r.error); return; }
    closeModal('modal-theme'); loadAdminThemes();
  });
}
function deleteTheme(id){ if(!confirm('このテーマを削除しますか？')) return; api({action:'adminDeleteTheme',themeId:id}).then(function(){ loadAdminThemes(); }); }

// ── 管理: 設問 ──
function openQuestionsForTheme(themeId,themeName){
  state.adminCurrentTheme=themeId; state.adminCurrentRound=1;
  document.getElementById('admin-q-theme-name').textContent=themeName+' の設問管理';
  [1,2,3].forEach(function(r){ document.getElementById('q-tab-'+r).classList.toggle('active',r===1); });
  document.getElementById('copy-from-round1-wrap').style.display='none';
  adminTab('questions'); loadAdminQuestions();
}
function loadAdminQuestions(){
  var el=document.getElementById('admin-question-list');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
  api({action:'adminGetQuestions',themeId:state.adminCurrentTheme}).then(function(r){
    var qs=(r.questions||[]).filter(function(q){ return String(q.round)===String(state.adminCurrentRound); });
    if(!qs.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📝</div><p>設問がありません</p></div>'; return; }
    el.innerHTML = qs.map(function(q){
      return '<div class="theme-row" style="cursor:default">' +
        '<div class="q-row-top">'  +
        '<span class="q-num">'+q.orderNum+'.</span>' +
        '<span class="type-badge '+(q.questionType==='select'?'type-select':'type-text')+'">'+(q.questionType==='select'?'選択式':'記述式')+'</span></div>' +
        '<div class="q-text">'+escBr(q.questionText)+'</div>'  +
        (q.questionType==='select'&&q.options?'<div style="font-size:12px;color:var(--gray-400);margin-bottom:8px">選択肢: '+esc(String(q.options).replace(/\n/g,' / '))+'</div>':'') +
        '<div class="btn-group">' +
        '<button class="btn btn-secondary btn-sm" onclick="openQuestionModal(\''+q.questionId+'\')">編集</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteQuestion(\''+q.questionId+'\')">削除</button>' +
        '</div></div>';
    }).join('');
  });
}
function openQuestionModal(qid){
  document.getElementById('modal-q-id').value=qid||'';
  document.getElementById('modal-q-text').value='';
  document.getElementById('modal-q-options').value='';
  document.getElementById('modal-q-order').value='';
  document.getElementById('modal-q-error').innerHTML='';
  setQType('text');
  if(qid){
    api({action:'adminGetQuestions',themeId:state.adminCurrentTheme}).then(function(r){
      var q=(r.questions||[]).find(function(q){ return q.questionId===qid; });
      if(q){
        document.getElementById('modal-q-text').value=q.questionText;
        document.getElementById('modal-q-order').value=q.orderNum;
        setQType(q.questionType||'text');
        if(q.questionType==='select') document.getElementById('modal-q-options').value=q.options||'';
      }
    });
    document.getElementById('modal-q-title').textContent='設問を編集';
  } else { document.getElementById('modal-q-title').textContent='設問を追加'; }
  document.getElementById('modal-question').style.display='flex';
}
var OPTION_TEMPLATES = {
  level5: '1=未着手\n2=意識あり\n3=実施中\n4=定着\n5=他者に指導できる',
  agree4: '1=そう思わない\n2=あまりそう思わない\n3=ややそう思う\n4=そう思う',
  freq4:  '1=ほとんどしない\n2=たまにする\n3=よくする\n4=いつもする'
};
function insertTemplate(key) {
  document.getElementById('modal-q-options').value = OPTION_TEMPLATES[key];
}

function setQType(type){
  document.getElementById('qtype-text-btn').classList.toggle('active',type==='text');
  document.getElementById('qtype-select-btn').classList.toggle('active',type==='select');
  document.getElementById('modal-q-options-wrap').style.display=type==='select'?'block':'none';
  document.getElementById('modal-question').dataset.qtype=type;
}
function saveQuestion(){
  var qid=document.getElementById('modal-q-id').value;
  var text=document.getElementById('modal-q-text').value.trim();
  var order=document.getElementById('modal-q-order').value||'1';
  var qtype=document.getElementById('modal-question').dataset.qtype||'text';
  var opts=qtype==='select'?document.getElementById('modal-q-options').value.trim():'';
  if(!text){ showError('modal-q-error','設問テキストを入力してください'); return; }
  api({action:'adminSaveQuestion',questionId:qid||null,themeId:state.adminCurrentTheme,
    round:state.adminCurrentRound,orderNum:parseInt(order)||1,
    questionText:text,questionType:qtype,options:opts
  }).then(function(r){
    if(!r.ok){ showError('modal-q-error',r.error); return; }
    closeModal('modal-question'); loadAdminQuestions();
  });
}
function deleteQuestion(id){ if(!confirm('この設問を削除しますか？')) return; api({action:'adminDeleteQuestion',questionId:id}).then(function(){ loadAdminQuestions(); }); }
function copyFromRound1(){
  if(!confirm('初回の設問をこのタブにコピーします。既存の設問は残ります。よろしいですか？')) return;
  api({action:'adminGetQuestions',themeId:state.adminCurrentTheme}).then(function(r){
    var qs=(r.questions||[]).filter(function(q){ return String(q.round)==='1'; });
    if(!qs.length){ alert('初回の設問が見つかりません。'); return; }
    Promise.all(qs.map(function(q){
      return api({action:'adminSaveQuestion',questionId:null,themeId:state.adminCurrentTheme,
        round:state.adminCurrentRound,orderNum:q.orderNum,questionText:q.questionText,
        questionType:q.questionType,options:q.options||''});
    })).then(function(){ loadAdminQuestions(); });
  });
}

// ── 管理: ユーザー ──
function loadAdminUsers(){
  api({action:'adminGetUsers'}).then(function(r){
    var el=document.getElementById('admin-user-list');
    if(!r.ok||!r.users||!r.users.length){ el.innerHTML='<div class="empty"><div class="empty-icon">👤</div><p>ユーザーがいません</p></div>'; return; }
    el.innerHTML='<div class="table-wrap"><table><tr><th>ユーザー名</th><th>登録日</th><th></th></tr>'+
      r.users.map(function(u){
        return '<tr><td>'+esc(u.username)+'</td>' +
          '<td style="font-size:12px;color:var(--gray-400)">'+(u.createdAt?String(u.createdAt).slice(0,10):'')+'</td>' +
          '<td><button class="btn btn-danger btn-sm" onclick="deleteUser(\''+u.userId+'\',\''+esc(u.username)+'\')">削除</button></td></tr>';
      }).join('')+'</table></div>';
  });
}
function openCreateUserModal(){
  document.getElementById('new-user-name').value='';
  document.getElementById('new-user-pass').value='';
  document.getElementById('modal-user-error').innerHTML='';
  document.getElementById('modal-create-user').style.display='flex';
}
function adminCreateUser(){
  var u=document.getElementById('new-user-name').value.trim();
  var p=document.getElementById('new-user-pass').value;
  if(!u||!p){ showError('modal-user-error','入力してください'); return; }
  api({action:'adminCreateUser',username:u,password:p}).then(function(r){
    if(!r.ok){ showError('modal-user-error',r.error); return; }
    closeModal('modal-create-user'); loadAdminUsers();
  });
}
function deleteUser(id,name){ if(!confirm(name+' を削除しますか？')) return; api({action:'adminDeleteUser',userId:id}).then(function(){ loadAdminUsers(); }); }

// ── 管理: 回答確認 ──
function loadAdminAnswersUserList(){
  var el=document.getElementById('admin-answers-content');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
  api({action:'adminGetUsers'}).then(function(r){
    if(!r.ok||!r.users||!r.users.length){ el.innerHTML='<div class="empty"><div class="empty-icon">👤</div><p>ユーザーがいません</p></div>'; return; }
    el.innerHTML=r.users.map(function(u){
      return '<div class="theme-card" onclick="openAdminUserDetail(\''+u.userId+'\',\''+esc(u.username)+'\')">' +
        '<div><div class="theme-name">'+esc(u.username)+'</div>' +
        '<div class="theme-desc">登録: '+(u.createdAt?String(u.createdAt).slice(0,10):'')+'</div></div>' +
        '<div class="arrow">›</div></div>';
    }).join('');
  });
}
function openAdminUserDetail(userId,username){
  document.getElementById('admin-detail-username').textContent=username+' さんの回答';
  var el=document.getElementById('admin-detail-content');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中...</div>';
  adminTab('answer-detail');
  api({action:'adminGetUserAnswers',userId:userId}).then(function(r){
    if(!r.ok||!r.answerGroups||!r.answerGroups.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📝</div><p>回答がありません</p></div>'; return; }
    var byTheme={};
    r.answerGroups.forEach(function(g){ if(!byTheme[g.themeId]) byTheme[g.themeId]={themeName:g.themeName,rounds:[]}; byTheme[g.themeId].rounds.push(g); });
    el.innerHTML=Object.values(byTheme).map(function(theme){
      return '<div style="margin-bottom:16px"><div style="font-size:15px;font-weight:700;margin-bottom:8px">'+esc(theme.themeName)+'</div>'+
        theme.rounds.map(function(g){
          return '<div class="accordion" style="margin-bottom:8px">' +
            '<div class="acc-head" onclick="toggleGroup(this)">'  +
            '<div style="display:flex;align-items:center;gap:8px"><span class="round-badge round-'+g.round+'">'+ROUND_LABELS[g.round]+'</span>' +
            '<span style="font-size:12px;color:var(--gray-400)">'+(g.answeredAt?String(g.answeredAt).slice(0,10):'')+'</span></div>' +
            '<span class="acc-chevron">▼</span></div>' +
            '<div class="acc-body open">'+
            g.items.map(function(item){
              return '<div class="qa-item"><div class="qa-q">'+escBr(item.questionText)+'</div>' +
                '<div class="qa-a">'+esc(item.answerText||'（未回答）')+'</div></div>';
            }).join('')+'</div></div>';
        }).join('')+'</div>';
    }).join('');
  });
}

// ── ユーティリティ ──
function closeModal(id){ document.getElementById(id).style.display='none'; }
function showError(elId,msg){ var el=document.getElementById(elId); if(el) el.innerHTML=msg?'<div class="alert alert-error">'+esc(msg)+'</div>':''; }
function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escBr(str){ return esc(str).replace(/\n/g,'<br>'); }

document.getElementById('login-password').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('admin-password').addEventListener('keydown',function(e){ if(e.key==='Enter') doAdminLogin(); });


</script>
