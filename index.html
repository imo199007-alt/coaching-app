<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>振り返りノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#F5F6F8;
  --surface:#FFFFFF;
  --surface-2:#F9FAFB;
  --border:#E5E7EB;
  --border-2:#D1D5DB;
  --t1:#111827;
  --t2:#4B5563;
  --t3:#9CA3AF;
  --blue:#2563EB;
  --blue-2:#1D4ED8;
  --blue-bg:#EFF6FF;
  --blue-border:#BFDBFE;
  --blue-t:#1D4ED8;
  --green:#059669;
  --green-bg:#ECFDF5;
  --green-border:#A7F3D0;
  --green-t:#065F46;
  --amber:#D97706;
  --amber-bg:#FFFBEB;
  --amber-border:#FDE68A;
  --amber-t:#92400E;
  --purple:#7C3AED;
  --purple-bg:#F5F3FF;
  --purple-border:#DDD6FE;
  --purple-t:#4C1D95;
  --danger:#DC2626;
  --danger-bg:#FEF2F2;
  --r4:4px;--r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --font:'Noto Sans JP',-apple-system,sans-serif;
  --font-num:'Inter',var(--font);
  --dur:150ms;
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--t1);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
#app{max-width:640px;margin:0 auto}
.page{display:none}.page.active{display:block}
img,svg{display:block}

/* ── TOPBAR ─────────────────────────── */
.topbar{
  height:56px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:100;
}
.topbar-brand{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-num);font-size:16px;font-weight:700;
  color:var(--t1);letter-spacing:-.02em;
}
.brand-dot{width:8px;height:8px;background:var(--blue);border-radius:50%}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-user{font-size:13px;color:var(--t2);font-weight:500}
.topbar-out{
  font-size:12px;font-weight:500;color:var(--t3);
  background:none;border:1px solid var(--border);
  border-radius:var(--r6);padding:5px 12px;cursor:pointer;
  font-family:var(--font);transition:all var(--dur);
}
.topbar-out:hover{color:var(--t2);border-color:var(--border-2);background:var(--surface-2)}

/* ── AUTH ───────────────────────────── */
.auth-page{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:40px 20px;
}
.auth-card{
  width:100%;max-width:400px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r20);padding:40px 36px;
  box-shadow:var(--shadow-lg);
  animation:slideUp .22s cubic-bezier(0,0,.3,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.auth-card{padding:32px 24px}}
.auth-logo{
  width:52px;height:52px;background:var(--blue-bg);
  border:1px solid var(--blue-border);border-radius:var(--r12);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
}
.auth-logo i{font-size:24px;color:var(--blue)}
.auth-title{text-align:center;font-family:var(--font-num);font-size:22px;font-weight:700;color:var(--t1);margin-bottom:4px;letter-spacing:-.02em}
.auth-sub{text-align:center;font-size:13px;color:var(--t3);margin-bottom:32px}
.auth-hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.auth-footer{text-align:center;font-size:13px;color:var(--t3);line-height:1.8}
.auth-link{color:var(--blue);background:none;border:none;font-size:13px;font-family:var(--font);cursor:pointer;font-weight:500;transition:opacity var(--dur)}
.auth-link:hover{opacity:.75}
.admin-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue-t);border:1px solid var(--blue-border);background:var(--blue-bg);padding:3px 10px;border-radius:var(--r4);margin-bottom:14px}

/* ── FIELD ──────────────────────────── */
.field{margin-bottom:18px}
.field-label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t2);margin-bottom:7px;font-family:var(--font-num)}
.field-input{
  width:100%;height:46px;padding:0 14px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r8);font-size:15px;color:var(--t1);
  font-family:var(--font);
  transition:border-color var(--dur),box-shadow var(--dur),background var(--dur);
  -webkit-appearance:none;
}
.field-input::placeholder{color:var(--t3)}
.field-input:focus{outline:none;border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field-textarea{
  width:100%;min-height:120px;padding:12px 14px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r8);font-size:15px;font-family:var(--font);
  color:var(--t1);resize:vertical;line-height:1.7;
  transition:border-color var(--dur),box-shadow var(--dur),background var(--dur);
  -webkit-appearance:none;
}
.field-textarea::placeholder{color:var(--t3)}
.field-textarea:focus{outline:none;border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* ── BUTTONS ────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-height:46px;padding:0 22px;border:none;border-radius:var(--r8);
  font-size:14px;font-weight:700;font-family:var(--font);
  letter-spacing:.01em;white-space:nowrap;cursor:pointer;
  transition:all var(--dur) var(--ease);
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
}
.btn:active:not(:disabled){transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 1px 2px rgba(37,99,235,.3)}
.btn-primary:hover:not(:disabled){background:var(--blue-2);box-shadow:0 4px 12px rgba(37,99,235,.25)}
.btn-ghost{background:var(--surface);color:var(--t2);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){background:var(--surface-2);border-color:var(--border-2);color:var(--t1)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover:not(:disabled){background:#B91C1C}
.btn-sm{min-height:34px;padding:0 14px;font-size:13px}
.btn-full{width:100%}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn.loading{pointer-events:none}
.btn.loading .btn-text{opacity:0}
.btn.loading::after{content:'';position:absolute;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.btn-ghost.loading::after{border-color:rgba(0,0,0,.1);border-top-color:var(--t2)}

/* ── TABS ───────────────────────────── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{
  flex:1;height:48px;border:none;background:none;
  font-size:14px;font-weight:500;font-family:var(--font);
  color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all var(--dur);-webkit-tap-highlight-color:transparent;
}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}

/* ── SEGMENT ────────────────────────── */
.seg{
  display:flex;background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--r10);
  padding:3px;gap:3px;margin-bottom:20px;
}
.seg-btn{
  flex:1;height:36px;border:none;background:none;
  border-radius:7px;font-size:13px;font-weight:500;
  font-family:var(--font);color:var(--t3);cursor:pointer;
  transition:all var(--dur);-webkit-tap-highlight-color:transparent;
}
.seg-btn.active{background:var(--surface);color:var(--blue);font-weight:700;box-shadow:var(--shadow-sm)}

/* ── THEME CARDS ────────────────────── */
.theme-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r16);margin-bottom:10px;cursor:pointer;
  display:flex;align-items:center;padding:16px 18px;gap:14px;
  box-shadow:var(--shadow-sm);
  transition:all var(--dur) var(--ease);
  -webkit-tap-highlight-color:transparent;
}
.theme-card:hover{border-color:var(--blue-border);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.theme-card:active{transform:translateY(0);box-shadow:var(--shadow-sm)}
.tc-icon{
  width:44px;height:44px;border-radius:var(--r10);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:20px;
}
.tc-blue{background:var(--blue-bg);color:var(--blue)}
.tc-green{background:var(--green-bg);color:var(--green)}
.tc-amber{background:var(--amber-bg);color:var(--amber)}
.tc-purple{background:var(--purple-bg);color:var(--purple)}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:6px}
.tc-sub{font-size:12px;color:var(--t3);margin-bottom:6px}
.tc-badges{display:flex;flex-wrap:wrap;gap:5px}
.tc-arrow{font-size:16px;color:var(--t3);flex-shrink:0;transition:all var(--dur)}
.theme-card:hover .tc-arrow{transform:translateX(2px);color:var(--blue)}

/* ── BADGES ─────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--font-num);letter-spacing:.02em}
.badge-done{background:var(--green-bg);color:var(--green-t);border:1px solid var(--green-border)}
.badge-todo{background:var(--surface-2);color:var(--t3);border:1px solid var(--border)}
.badge-muted{background:var(--surface-2);color:var(--t3);border:1px solid var(--border);font-size:10px}
.rbadge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r4);font-size:12px;font-weight:700;font-family:var(--font-num)}
.rb-1{background:var(--blue-bg);color:var(--blue-t)}
.rb-2{background:var(--green-bg);color:var(--green-t)}
.rb-3{background:var(--amber-bg);color:var(--amber-t)}
.tp{font-size:11px;padding:2px 8px;border-radius:var(--r4);font-weight:700;display:inline-block;letter-spacing:.04em}
.tp-text{background:var(--surface-2);color:var(--t3);border:1px solid var(--border)}
.tp-select{background:var(--purple-bg);color:var(--purple-t)}

/* ── PAGE LAYOUT ────────────────────── */
.pb{padding:24px 20px 80px}
@media(max-width:480px){.pb{padding:20px 16px 80px}.topbar{padding:0 16px}}
.page-eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:4px;font-family:var(--font-num)}
.page-title{font-size:22px;font-weight:700;color:var(--t1);font-family:var(--font-num);letter-spacing:-.02em;line-height:1.3;margin-bottom:20px}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;font-family:var(--font-num)}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--t3);background:none;border:none;cursor:pointer;padding:8px 0;margin-bottom:16px;font-family:var(--font);transition:color var(--dur);-webkit-tap-highlight-color:transparent}
.back-btn i{transition:transform var(--dur)}
.back-btn:hover{color:var(--blue)}
.back-btn:hover i{transform:translateX(-3px)}

/* ── STEP INDICATOR ─────────────────── */
.steps{display:flex;align-items:center;margin-bottom:24px;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:14px 16px}
.step-item{display:flex;align-items:center;gap:8px;flex:1}
.step-num{width:26px;height:26px;border-radius:50%;border:2px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);font-family:var(--font-num);flex-shrink:0;transition:all .2s}
.step-num.active{border-color:var(--blue);background:var(--blue);color:#fff}
.step-num.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.step-num.done::after{content:'✓';font-size:12px}
.step-num.done .s-num{display:none}
.step-label{font-size:12px;color:var(--t3);font-weight:500}
.step-label.active{color:var(--blue);font-weight:700}
.step-label.done{color:var(--green)}
.step-line{flex:1;height:1px;background:var(--border);margin:0 8px}

/* ── ROUND SELECTOR ─────────────────── */
.round-select-list{display:flex;flex-direction:column;gap:8px}
.round-opt{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r12);padding:14px 16px;cursor:pointer;
  transition:all var(--dur);-webkit-tap-highlight-color:transparent;
  box-shadow:var(--shadow-sm);
}
.round-opt input[type=radio]{display:none}
.round-opt:hover{border-color:var(--blue-border);background:var(--blue-bg)}
.round-opt:has(input:checked){border-color:var(--blue);background:var(--blue-bg);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.round-opt-icon-wrap{width:40px;height:40px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all var(--dur)}
.round-color-1{background:var(--blue-bg);color:var(--blue)}
.round-color-2{background:var(--green-bg);color:var(--green)}
.round-color-3{background:var(--amber-bg);color:var(--amber)}
.round-opt:has(input:checked) .round-opt-icon-wrap{transform:scale(1.05)}
.round-opt-body{flex:1}
.round-opt-label{font-size:15px;font-weight:700;color:var(--t1);transition:color var(--dur)}
.round-opt:has(input:checked) .round-opt-label{color:var(--blue)}
.round-opt-desc{font-size:12px;color:var(--t3);margin-top:2px}
.round-opt-arrow{font-size:16px;color:var(--t3);flex-shrink:0;transition:all var(--dur)}
.round-opt:has(input:checked) .round-opt-arrow{transform:translateX(2px);color:var(--blue)}

/* ── ANSWER FORM ────────────────────── */
.q-form-wrap{display:flex;flex-direction:column;gap:0}
.selected-round-banner{
  display:flex;align-items:center;gap:10px;
  background:var(--blue-bg);border:1px solid var(--blue-border);
  border-radius:var(--r10);padding:12px 16px;margin-bottom:20px;
}
.selected-round-banner i{font-size:18px;color:var(--blue)}
.selected-round-banner-text{font-size:13px;font-weight:700;color:var(--blue-t)}
.q-block{
  padding:20px 0;border-bottom:1px solid var(--border);
  animation:fadeUp .18s cubic-bezier(0,0,.3,1) both;
}
.q-block:last-child{border-bottom:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.q-num-label{margin-bottom:6px}
.q-num-badge{display:inline-block;font-size:11px;font-weight:700;font-family:var(--font-num);color:var(--blue-t);background:var(--blue-bg);border:1px solid var(--blue-border);padding:2px 9px;border-radius:var(--r4);letter-spacing:.03em}
.q-label{font-size:15px;font-weight:500;color:var(--t1);margin-bottom:12px;line-height:1.65;white-space:pre-wrap}
.q-block textarea{width:100%;min-height:100px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r8);font-size:15px;font-family:var(--font);color:var(--t1);resize:vertical;line-height:1.7;transition:border-color var(--dur),box-shadow var(--dur),background var(--dur);-webkit-appearance:none}
.q-block textarea::placeholder{color:var(--t3)}
.q-block textarea:focus{outline:none;border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* ── OPTION CARDS ───────────────────── */
.opt-list{display:flex;flex-direction:column;gap:7px}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px}
.opt-card{
  position:relative;display:flex;align-items:center;justify-content:center;
  min-height:46px;padding:10px 12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r8);cursor:pointer;text-align:center;
  transition:all var(--dur);-webkit-tap-highlight-color:transparent;
  box-shadow:var(--shadow-sm);
}
.opt-card input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.opt-card span{font-size:13px;font-weight:500;color:var(--t2);line-height:1.4;transition:color var(--dur)}
.opt-card:hover{border-color:var(--blue-border);background:var(--blue-bg)}
.opt-card:has(input:checked){border-color:var(--blue);background:var(--blue-bg);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.opt-card:has(input:checked) span{color:var(--blue-t);font-weight:700}
.opt-list .opt-card{justify-content:flex-start;padding:12px 16px;text-align:left}
.opt-list .opt-card span{font-size:14px}

/* ── QA VIEW ────────────────────────── */
.qa-block{padding:16px 0;border-bottom:1px solid var(--border)}
.qa-block:last-child{border-bottom:none;padding-bottom:0}
.qa-q{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;white-space:pre-wrap;font-family:var(--font-num)}
.qa-a{font-size:15px;color:var(--t1);white-space:pre-wrap;line-height:1.7}

/* ── ACCORDION ──────────────────────── */
.acc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;gap:12px;transition:background var(--dur);-webkit-tap-highlight-color:transparent}
.acc-head:hover{background:var(--surface-2)}
.acc-chevron{font-style:normal;font-size:14px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.acc-head.open .acc-chevron{transform:rotate(180deg)}
.acc-body{display:none;padding:0 18px 16px;border-top:1px solid var(--border)}
.acc-body.open{display:block;animation:fadeUp .18s cubic-bezier(0,0,.3,1) both}

/* ── SUCCESS VIEW ───────────────────── */
.success-view{text-align:center;padding:48px 24px;animation:fadeUp .3s cubic-bezier(0,0,.3,1) both}
.success-icon-wrap{width:72px;height:72px;background:var(--green-bg);border:2px solid var(--green-border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.success-icon-wrap i{font-size:34px;color:var(--green)}
.success-title{font-size:22px;font-weight:700;color:var(--t1);margin-bottom:8px;font-family:var(--font-num);letter-spacing:-.02em}
.success-sub{font-size:14px;color:var(--t2);margin-bottom:32px;line-height:1.7}

/* ── ALERTS ─────────────────────────── */
.alert{padding:12px 16px;border-radius:var(--r8);font-size:14px;margin-bottom:16px;border-left:3px solid;animation:fadeUp .18s cubic-bezier(0,0,.3,1) both}
.alert-error{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
.alert-success{background:var(--green-bg);color:var(--green-t);border-color:var(--green)}
.alert-info{background:var(--blue-bg);color:var(--blue-t);border-color:var(--blue)}

/* ── ADMIN ──────────────────────────── */
.admin-nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.admin-nav-btn{height:44px;border:1px solid var(--border);border-radius:var(--r8);background:var(--surface);font-size:13px;font-weight:500;font-family:var(--font);color:var(--t2);cursor:pointer;transition:all var(--dur);box-shadow:var(--shadow-sm);-webkit-tap-highlight-color:transparent}
.admin-nav-btn:hover{border-color:var(--border-2);color:var(--t1);background:var(--surface-2)}
.admin-nav-btn.active{border-color:var(--blue);color:var(--blue-t);background:var(--blue-bg);font-weight:700}

/* ── LIST GROUP ─────────────────────── */
.list-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;box-shadow:var(--shadow-sm)}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);gap:12px;transition:background var(--dur)}
.list-item:last-child{border-bottom:none}
.list-item.clickable{cursor:pointer;-webkit-tap-highlight-color:transparent}
.list-item.clickable:hover{background:var(--surface-2)}
.li-title{font-size:14px;font-weight:500;color:var(--t1)}
.li-sub{font-size:12px;color:var(--t3);margin-top:2px}
.li-arrow{font-size:16px;color:var(--t3);flex-shrink:0;transition:all var(--dur)}
.list-item.clickable:hover .li-arrow{transform:translateX(2px);color:var(--blue)}

/* ── Q ROW ──────────────────────────── */
.q-row{padding:16px 0;border-bottom:1px solid var(--border)}
.q-row:last-child{border-bottom:none}
.q-row-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-num{font-size:12px;color:var(--t3);font-weight:700;font-family:var(--font-num);min-width:18px}
.q-text{font-size:14px;color:var(--t1);white-space:pre-wrap;margin-bottom:8px;line-height:1.65}
.q-opts{font-size:12px;color:var(--t3);margin-bottom:10px}

/* ── MODAL ──────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s var(--ease) both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r20);width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .2s cubic-bezier(0,0,.3,1) both}
@keyframes modalIn{from{opacity:0;transform:scale(.95)translateY(8px)}to{opacity:1;transform:scale(1)translateY(0)}}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:17px;font-weight:700;color:var(--t1);font-family:var(--font-num);letter-spacing:-.01em}
.modal-close{width:32px;height:32px;background:none;border:none;border-radius:50%;font-size:20px;color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--dur)}
.modal-close:hover{background:var(--surface-2);color:var(--t1)}
.modal-body{padding:20px 24px 28px}
@media(max-width:480px){.modal-head,.modal-body{padding-left:20px;padding-right:20px}}

/* ── SKELETON ───────────────────────── */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--surface-2) 50%,var(--border) 75%);background-size:200% 100%;border-radius:var(--r6);animation:shimmer 1.4s infinite}
@keyframes shimmer{to{background-position:-200% 0}}
.skel-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;box-shadow:var(--shadow-sm)}
.skel-item{padding:16px 18px;border-bottom:1px solid var(--border)}
.skel-item:last-child{border-bottom:none}
.skel-line{height:14px;border-radius:var(--r4)}
.skel-line-sm{height:11px;border-radius:3px;margin-top:7px}

/* ── MISC ───────────────────────────── */
.empty{text-align:center;padding:48px 16px;color:var(--t3)}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.4}
.empty p{font-size:14px}
.loading{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.div{border:none;border-top:1px solid var(--border);margin:20px 0}

@media(max-width:480px){
  .btn-group{flex-direction:column}
  .btn-group .btn{width:100%}
  .list-item .btn-group,.q-row .btn-group{flex-direction:row}
  .list-item .btn-group .btn,.q-row .btn-group .btn{width:auto}
}
</style>
</head>

<script>


// ========== 設定 ==========
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwa9hD7G_OphQXQtA5fbBZ_imhAL87FIdmWMjfxtooLv91TfVYn6EA1m03AHDo1kWjJ/exec';
var ROUND_LABELS = {1:'初回',2:'1か月後',3:'3か月後'};
var OPTION_TEMPLATES = {
  level5:'1=未着手\n2=意識あり\n3=実施中\n4=定着\n5=他者に指導できる',
  agree4:'1=そう思わない\n2=あまりそう思わない\n3=ややそう思う\n4=そう思う',
  freq4:'1=ほとんどしない\n2=たまにする\n3=よくする\n4=いつもする'
};

// ========== 状態管理（localStorage でセッション保持） ==========
var state = {
  token: localStorage.getItem('nrt_token') || null,
  role:  localStorage.getItem('nrt_role')  || null,
  username: localStorage.getItem('nrt_username') || null,
  userId: localStorage.getItem('nrt_userId') || null,
  currentTheme: null,
  currentRound: null,
  adminCurrentTheme: null,
  adminCurrentRound: 1
};

function saveSession(token, role, username, userId) {
  state.token = token; state.role = role;
  state.username = username; state.userId = userId;
  localStorage.setItem('nrt_token', token);
  localStorage.setItem('nrt_role', role);
  localStorage.setItem('nrt_username', username || '');
  localStorage.setItem('nrt_userId', userId || '');
}
function clearSession() {
  state.token = null; state.role = null;
  state.username = null; state.userId = null;
  ['nrt_token','nrt_role','nrt_username','nrt_userId'].forEach(function(k){ localStorage.removeItem(k); });
}

// ========== API ==========
function api(data) {
  data.token = state.token || null;
  return fetch(GAS_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(data)
  })
  .then(function(r){ return r.json(); })
  .catch(function(e){ return {ok:false, error:'通信エラー: '+e.message}; });
}

// ========== ページ制御 ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showUserLogin() {
  document.getElementById('auth-user-block').style.display = 'flex';
  document.getElementById('auth-admin-block').style.display = 'none';
}
function showAdminLogin() {
  document.getElementById('auth-user-block').style.display = 'none';
  document.getElementById('auth-admin-block').style.display = 'flex';
}
function switchHomeTab(tab) {
  var tabs = document.querySelectorAll('#page-home .tabs .tab');
  tabs[0].classList.toggle('active', tab==='answer');
  tabs[1].classList.toggle('active', tab==='history');
  document.getElementById('home-answer').style.display  = tab==='answer'  ? 'block' : 'none';
  document.getElementById('home-history').style.display = tab==='history' ? 'block' : 'none';
  if (tab==='history') loadHistoryThemes();
}
function adminTab(tab) {
  ['themes','questions','users','answers','answer-detail'].forEach(function(t){
    document.getElementById('admin-'+t).style.display = 'none';
  });
  document.querySelectorAll('.admin-nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var tabMap = {themes:0, users:1, answers:2};
  if (tabMap[tab] !== undefined) {
    document.querySelectorAll('.admin-nav-btn')[tabMap[tab]].classList.add('active');
  }
  if (tab==='themes')        { loadAdminThemes();          document.getElementById('admin-themes').style.display='block'; }
  if (tab==='questions')     {                             document.getElementById('admin-questions').style.display='block'; }
  if (tab==='users')         { loadAdminUsers();           document.getElementById('admin-users').style.display='block'; }
  if (tab==='answers')       { loadAdminAnswersUserList(); document.getElementById('admin-answers').style.display='block'; }
  if (tab==='answer-detail') {                             document.getElementById('admin-answer-detail').style.display='block'; }
}
function adminQRound(round) {
  state.adminCurrentRound = round;
  [1,2,3].forEach(function(r){ document.getElementById('q-tab-'+r).classList.toggle('active', r===round); });
  var w = document.getElementById('copy-from-round1-wrap');
  if (w) w.style.display = round===1 ? 'none' : 'block';
  loadAdminQuestions();
}

// ========== 認証 ==========

function openAnswerTheme(themeId, themeName) {
  state.currentTheme = themeId; state.currentRound = null;
  document.getElementById('answer-theme-name').textContent = themeName;
  document.getElementById('answer-eyebrow').textContent = '振り返り記録';
  document.getElementById('answer-questions').innerHTML = '';
  document.getElementById('answer-error').innerHTML = '';
  document.getElementById('answer-actions').style.display = 'none';
  // Reset step indicator
  var s1n=document.getElementById('step-num-1'); var s1l=document.getElementById('step-label-1');
  var s2n=document.getElementById('step-num-2'); var s2l=document.getElementById('step-label-2');
  var stepsEl=document.getElementById('answer-steps');
  if(s1n){s1n.className='step-num active';s1l.className='step-label active';}
  if(s2n){s2n.className='step-num';s2l.className='step-label';}
  if(stepsEl) stepsEl.style.display='flex';
  // 回数選択
  var roundMeta = {
    1:{icon:'ti-flag',desc:'研修直後の振り返り'},
    2:{icon:'ti-calendar',desc:'1か月後の定着確認'},
    3:{icon:'ti-trophy',desc:'3か月後の成果確認'}
  };
  var html = '<div style="margin-bottom:28px"><div class="sec-label">何回目の振り返りですか？</div><div class="round-select-list">';
  [1,2,3].forEach(function(r){
    html += '<label class="round-opt">' +
      '<input type="radio" name="round" value="'+r+'" onchange="selectRound('+r+')">' +
      '<div class="round-opt-icon-wrap round-color-'+r+'">' +
      '<i class="ti '+roundMeta[r].icon+'" aria-hidden="true"></i>' +
      '</div>' +
      '<div class="round-opt-body">' +
      '<div class="round-opt-label">'+ROUND_LABELS[r]+'</div>' +
      '<div class="round-opt-desc">'+roundMeta[r].desc+'</div>' +
      '</div>' +
      '<i class="ti ti-chevron-right round-opt-arrow" aria-hidden="true"></i>' +
      '</label>';
  });
  html += '</div></div>';
  document.getElementById('answer-round-select').innerHTML = html;
  showPage('page-answer');
}

function selectRound(round) {
  state.currentRound = round;
  // Step indicator: move to step 2
  var s1n=document.getElementById('step-num-1'); var s1l=document.getElementById('step-label-1');
  var s2n=document.getElementById('step-num-2'); var s2l=document.getElementById('step-label-2');
  if(s1n){s1n.className='step-num done';s1l.className='step-label';}
  if(s2n){s2n.className='step-num active';s2l.className='step-label active';}
  var qEl  = document.getElementById('answer-questions');
  var actEl = document.getElementById('answer-actions');
  var errEl = document.getElementById('answer-error');
  qEl.innerHTML = '<div class="loading"><span class="spin"></span>設問を読み込み中...</div>';
  errEl.innerHTML = ''; actEl.style.display = 'none';

  api({action:'getQuestions', themeId:state.currentTheme, round:round}).then(function(r){
    if (!r.ok) { qEl.innerHTML='<div class="alert alert-error">'+esc(r.error)+'</div>'; return; }
    if (!r.questions||!r.questions.length) { qEl.innerHTML='<div class="alert alert-info">この回数の設問はまだ設定されていません。</div>'; return; }
    // 既回答チェック
    api({action:'getMyAnswers', themeId:state.currentTheme, round:round}).then(function(ar){
      var answered = ar.ok && ar.answers && ar.answers.length > 0 && ar.answers.some(function(a){ return a.answerText && a.answerText !== ''; });
      if (answered) {
        qEl.innerHTML = '<div class="alert alert-success">✅ この振り返りは回答済みです。</div>' + renderQAView(ar.answers);
        actEl.style.display = 'none';
      } else {
        qEl.innerHTML = renderAnswerForm(r.questions);
        actEl.style.display = 'block';
      }
    });
  });
}

function renderAnswerForm(questions) {
  return '<div class="q-form-wrap">' + questions.map(function(q, qi){
    var html = '<div class="q-block" data-qid="'+q.questionId+'">' +
      '<div class="q-num-label"><span class="q-num-badge">Q'+(qi+1)+'</span></div>' +
      '<div class="q-label">'+escBr(q.questionText)+'</div>';
    if (q.questionType==='select' && q.options) {
      var opts = String(q.options).split('\n').filter(function(o){ return o.trim(); });
      var isShort = opts.every(function(o){ return o.trim().length <= 10; });
      html += '<div class="'+(isShort?'opt-grid':'opt-list')+'">' +
        opts.map(function(o){
          return '<label class="opt-card"><input type="radio" name="q_'+q.questionId+'" value="'+esc(o.trim())+'"><span>'+esc(o.trim())+'</span></label>';
        }).join('') + '</div>';
    } else {
      html += '<textarea placeholder="ここに入力してください..."></textarea>';
    }
    return html + '</div>';
  }).join('') + '</div>';
}

function renderQAView(answers) {
  if (!answers||!answers.length) return '<div class="empty"><p>回答データがありません</p></div>';
  return answers.map(function(q){
    return '<div class="qa-block"><div class="qa-q">'+escBr(q.questionText)+'</div>' +
      '<div class="qa-a">'+(q.answerText ? esc(q.answerText) : '<span style="color:var(--ink4)">未回答</span>')+'</div></div>';
  }).join('');
}

function submitAnswers() {
  if (!state.currentRound){ showErr('answer-error','回数を選択してください'); return; }
  var fields = document.querySelectorAll('#answer-questions [data-qid]');
  var answers=[]; var invalid=false;
  fields.forEach(function(f){
    var qid=f.dataset.qid;
    var ta=f.querySelector('textarea'); var rd=f.querySelector('input[type=radio]:checked');
    var val=ta?ta.value.trim():(rd?rd.value:'');
    if(!val) invalid=true;
    answers.push({questionId:qid, answerText:val});
  });
  if(invalid){ showErr('answer-error','全ての設問に回答してください'); return; }
  showErr('answer-error','');
  var submitBtn = document.getElementById('submit-btn');
  if(submitBtn){ submitBtn.classList.add('loading'); submitBtn.disabled=true; }
  api({action:'submitAnswers', themeId:state.currentTheme, round:state.currentRound, answers:answers}).then(function(r){
    if(submitBtn){ submitBtn.classList.remove('loading'); submitBtn.disabled=false; }
    if(!r.ok){ showErr('answer-error', r.error); return; }
    document.getElementById('answer-questions').innerHTML='';
    document.getElementById('answer-round-select').innerHTML='';
    document.getElementById('answer-steps').style.display='none';
    document.getElementById('answer-actions').style.display='none';
    document.getElementById('answer-error').innerHTML='';
    var qEl=document.getElementById('answer-questions');
    qEl.innerHTML='<div class="success-view">' +
      '<div class="success-icon"><svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<circle class="check-circle" cx="26" cy="26" r="25"/>' +
      '<path class="check-mark" d="M14 27l8 8 16-16"/></svg></div>' +
      '<div class="success-title">回答を保存しました</div>' +
      '<div class="success-sub">振り返りを記録できました。<br>続けて履歴を確認できます。</div>' +
      '<div style="display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto">' +
      '<button class="btn btn-primary btn-full" onclick="showPage(\'page-home\')"><span class="btn-text">ホームへ戻る</span></button>' +
      '<button class="btn btn-ghost btn-full" onclick="switchHomeTabAndGo()"><span class="btn-text">履歴を確認する</span></button>' +
      '</div></div>';
  });
}

function toggleAcc(head) {
  var body = head.nextElementSibling;
  var isOpen = body.classList.contains('open');
  head.classList.toggle('open', !isOpen);
  if (!isOpen) {
    body.classList.add('open');
    if (body.innerHTML === '') {
      body.innerHTML = '<div class="loading"><span class="spin"></span>読み込み中...</div>';
      var themeId = body.dataset.theme;
      var round = body.dataset.round;
      api({action:'getMyAnswers', themeId:themeId, round:round}).then(function(r){
        body.innerHTML = r.ok && r.answers && r.answers.length ? renderQAView(r.answers) : '<div style="padding:8px;color:var(--ink4);font-size:13px">回答データがありません</div>';
      });
    }
  } else {
    body.classList.remove('open');
  }
}

    el.innerHTML=Object.values(byTheme).map(function(theme){
      return '<div style="margin-bottom:20px"><div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px">'+esc(theme.themeName)+'</div>'+
        theme.rounds.map(function(g){
          return '<div class="acc" style="margin-bottom:8px">' +
            '<div class="acc-head open" onclick="toggleAccStatic(this)">' +
            '<div style="display:flex;align-items:center;gap:8px"><span class="rbadge rb-'+g.round+'">'+ROUND_LABELS[g.round]+'</span>' +
            '<span style="font-size:12px;color:var(--ink4)">'+(g.answeredAt?String(g.answeredAt).slice(0,10):'')+'</span></div>' +
            '<em class="acc-chevron" style="transform:rotate(180deg)">▼</em></div>' +
            '<div class="acc-body open">'+
            g.items.map(function(item){
              return '<div class="qa-block"><div class="qa-q">'+escBr(item.questionText)+'</div>' +
                '<div class="qa-a">'+esc(item.answerText||'（未回答）')+'</div></div>';
            }).join('')+'</div></div>';
        }).join('')+'</div>';
    }).join('');
  });
}
function toggleAccStatic(head){
  var body=head.nextElementSibling;
  var isOpen=body.classList.contains('open');
  head.classList.toggle('open',!isOpen);
  body.classList.toggle('open',!isOpen);
  var ch=head.querySelector('.acc-chevron');
  if(ch) ch.style.transform=!isOpen?'rotate(180deg)':'rotate(0deg)';
}

// ========== ユーティリティ ==========
function closeModal(id){ document.getElementById(id).style.display='none'; }
function showErr(elId,msg){ var el=document.getElementById(elId); if(el) el.innerHTML=msg?'<div class="alert alert-error">'+esc(msg)+'</div>':''; }
function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escBr(str){ return esc(str).replace(/\n/g,'<br>'); }

document.getElementById('login-password').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ ['modal-theme','modal-question','modal-create-user'].forEach(function(id){ var m=document.getElementById(id); if(m&&m.style.display!=='none') closeModal(id); }); } });
document.getElementById('admin-password').addEventListener('keydown',function(e){ if(e.key==='Enter') doAdminLogin(); });



</script>
